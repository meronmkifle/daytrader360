<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DT360 · Trade Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══ DESIGN SYSTEM ══════════════════════════════════════════
   Bloomberg-inspired terminal aesthetic:
   - IBM Plex Mono for all data / numbers
   - IBM Plex Sans for labels and prose
   - Orange accent (#F60)
   - Black ruled lines, no rounded corners on data cells
   - Uppercase 10px labels, dense information layout
   - Light default, dark toggle
═══════════════════════════════════════════════════════════ */

:root{
  --bg:#fafaf8;
  --bg2:#f2f1ec;
  --bg3:#e8e7e0;
  --surf:#ffffff;
  --rule:#d8d6ce;
  --rule2:#b8b6ae;
  --txt:#111110;
  --txt2:#44433e;
  --txt3:#888680;
  --txt4:#b8b6ae;
  --acc:#ff6600;
  --acc2:#cc4400;
  --bull:#1a7a3e;
  --bear:#b82020;
  --bull-bg:#edf7f1;
  --bear-bg:#fdf0f0;
  --bull-txt:#0f4f28;
  --bear-txt:#7a1515;
  --info-bg:#eef4fd;
  --info-rule:#aac4ef;
  --info-txt:#0f3570;
  --warn-bg:#fef8ec;
  --warn-rule:#e8c56a;
  --warn-txt:#6b4200;
  --strc-bg:#f3f2fe;
  --strc-rule:#b8b2f5;
  --strc-txt:#2e268f;
  --font-data:'IBM Plex Mono',monospace;
  --font-ui:'IBM Plex Sans',sans-serif;
}
[data-theme=dark]{
  --bg:#0d0d0c;
  --bg2:#141412;
  --bg3:#1c1c1a;
  --surf:#1a1a18;
  --rule:#2e2e2a;
  --rule2:#444440;
  --txt:#e8e6de;
  --txt2:#a8a69e;
  --txt3:#666460;
  --txt4:#444440;
  --bull:#28b85a;
  --bear:#f04545;
  --bull-bg:#0a2015;
  --bear-bg:#200a0a;
  --bull-txt:#5ee88a;
  --bear-txt:#f88888;
  --info-bg:#0a1830;
  --info-rule:#1e3a6a;
  --info-txt:#6aabf8;
  --warn-bg:#1e1200;
  --warn-rule:#4a3000;
  --warn-txt:#f0b84a;
  --strc-bg:#100e28;
  --strc-rule:#2a2460;
  --strc-txt:#a89eff;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:var(--font-ui);
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background .15s,color .15s;
}

/* ══ LAYOUT ═════════════════════════════════════════ */
.page{max-width:1280px;margin:0 auto;padding:0 20px 64px}

/* ══ TOPBAR ═════════════════════════════════════════ */
.topbar{
  display:flex;align-items:stretch;
  border-bottom:2px solid var(--txt);
  margin-bottom:0;
}
.topbar-brand{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px 10px 0;
  border-right:1px solid var(--rule2);
}
.brand-mark{
  font-family:var(--font-data);
  font-size:15px;font-weight:600;
  color:var(--txt);letter-spacing:-.3px;
}
.brand-mark em{font-style:normal;color:var(--acc)}
.brand-sub{
  font-family:var(--font-data);
  font-size:10px;color:var(--txt3);letter-spacing:.5px;
  text-transform:uppercase;
}
.topbar-status{
  display:flex;align-items:center;gap:0;
  flex:1;overflow:hidden;
}
.status-cell{
  display:flex;flex-direction:column;justify-content:center;
  padding:8px 14px;border-right:1px solid var(--rule);
  white-space:nowrap;min-width:0;
}
.sc-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:3px}
.sc-val{font-family:var(--font-data);font-size:12px;font-weight:500;color:var(--txt)}
.sc-val.pos{color:var(--bull)}
.sc-val.neg{color:var(--bear)}
.sc-val.acc{color:var(--acc)}
.topbar-right{
  display:flex;align-items:center;gap:6px;
  padding:8px 0 8px 14px;margin-left:auto;
}
.tbtn{
  display:flex;align-items:center;gap:5px;
  background:none;border:1px solid var(--rule2);
  padding:5px 11px;font-family:var(--font-ui);
  font-size:11px;font-weight:500;color:var(--txt2);
  cursor:pointer;transition:all .12s;letter-spacing:.2px;
}
.tbtn:hover{background:var(--bg3);color:var(--txt);border-color:var(--txt)}
.tbtn svg{width:12px;height:12px;flex-shrink:0}
.tbtn.primary{background:var(--txt);color:var(--bg);border-color:var(--txt)}
.tbtn.primary:hover{background:var(--txt2)}

/* ══ NAV ════════════════════════════════════════════ */
.nav{
  display:flex;border-bottom:1px solid var(--rule);
  margin-bottom:24px;overflow-x:auto;
}
.nav-tab{
  font-family:var(--font-ui);font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.7px;
  padding:11px 16px;color:var(--txt3);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  white-space:nowrap;transition:all .12s;
}
.nav-tab:hover{color:var(--txt2)}
.nav-tab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ══ VIEWS ══════════════════════════════════════════ */
.view{display:none}.view.on{display:block}

/* ══ WEEK SECTION ═══════════════════════════════════ */
.week-section{margin-bottom:32px}
.week-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-top:2px solid var(--txt);
  border-bottom:1px solid var(--rule);
  margin-bottom:16px;gap:16px;flex-wrap:wrap;
}
.week-label{
  font-family:var(--font-data);font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;color:var(--txt);
}
.week-meta{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.wm-item{font-family:var(--font-data);font-size:10px;color:var(--txt3)}
.wm-item b{color:var(--txt2)}
.wm-item.pos b{color:var(--bull)}
.wm-item.neg b{color:var(--bear)}

/* ══ PICK CARD GRID ═════════════════════════════════ */
.pick-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
  gap:0;
  border-top:1px solid var(--rule);
  border-left:1px solid var(--rule);
}
.pcard{
  border-right:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
  cursor:pointer;background:var(--surf);
  transition:background .1s;
  position:relative;
}
.pcard:hover{background:var(--bg2)}
.pcard-accent-bar{height:3px;width:100%}

.pcard-body{padding:14px 16px}

/* Card header row */
.pcard-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pcard-tk{
  font-family:var(--font-data);font-size:20px;font-weight:600;
  color:var(--txt);letter-spacing:-.3px;line-height:1;
}
.pcard-co{font-size:11px;color:var(--txt3);margin-top:3px}
.pcard-meta-r{text-align:right}
.pconv{
  font-family:var(--font-data);font-size:22px;font-weight:600;
  color:var(--txt);line-height:1;
}
.pconv-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3)}

/* Status + date row */
.pcard-status-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.status-tag{
  font-family:var(--font-data);font-size:9px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;
  padding:2px 7px;border:1px solid;
}
.st-active    {color:var(--bull);border-color:var(--bull);background:var(--bull-bg)}
.st-hit_t1    {color:var(--bull);border-color:var(--bull);background:var(--bull-bg)}
.st-hit_t2    {color:var(--bull);border-color:var(--bull);background:var(--bull-bg)}
.st-stopped_out{color:var(--bear);border-color:var(--bear);background:var(--bear-bg)}
.st-closed    {color:var(--txt3);border-color:var(--rule2);background:var(--bg2)}
.pcard-date{font-family:var(--font-data);font-size:10px;color:var(--txt3)}
.type-dot{
  width:6px;height:6px;border-radius:50%;display:inline-block;
  margin-right:3px;vertical-align:middle;
}

/* Mini chart */
.mini-chart-wrap{height:72px;background:var(--bg2);margin-bottom:10px;border:1px solid var(--rule);position:relative}
canvas.mc{display:block;width:100%}

/* 4-cell level row */
.mini-levels{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--rule);margin-bottom:10px}
.ml{padding:5px 8px;border-right:1px solid var(--rule)}
.ml:last-child{border-right:none}
.ml-lbl{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:2px}
.ml-p{font-family:var(--font-data);font-size:12px;font-weight:600;color:var(--txt)}
.ml-pct{font-family:var(--font-data);font-size:9px;margin-top:1px}

/* PnL row */
.pcard-pnl{
  display:flex;align-items:center;gap:10px;
  padding-top:8px;border-top:1px solid var(--rule);
  font-family:var(--font-data);font-size:11px;
}
.pnl-val{font-size:13px;font-weight:600}
.pos{color:var(--bull)}.neg{color:var(--bear)}.neu{color:var(--txt3)}
.pcard-upd{
  margin-left:auto;display:flex;align-items:center;gap:4px;
  font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;
  color:var(--warn-txt);
}

/* ══ FILTER BAR ═════════════════════════════════════ */
.filter-bar{
  display:flex;align-items:center;gap:8px;
  padding:10px 0;border-bottom:1px solid var(--rule);
  margin-bottom:20px;flex-wrap:wrap;
}
.filter-bar input,.filter-bar select{
  font-family:var(--font-data);font-size:11px;
  padding:6px 10px;border:1px solid var(--rule2);
  background:var(--surf);color:var(--txt);
  outline:none;min-width:160px;
}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--acc)}
.fcount{font-family:var(--font-data);font-size:10px;color:var(--txt3);margin-left:4px}

/* ══ PERF STATS ════════════════════════════════════ */
.perf-stats-row{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  border-top:2px solid var(--txt);
  border-left:1px solid var(--rule);
  margin-bottom:24px;
}
.stat-cell{
  border-right:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
  padding:12px 14px;
}
.stat-k{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:6px}
.stat-v{font-family:var(--font-data);font-size:22px;font-weight:600;color:var(--txt);line-height:1}
.stat-sub{font-family:var(--font-data);font-size:10px;color:var(--txt3);margin-top:4px}

/* ══ TABLE ══════════════════════════════════════════ */
.tbl-wrap{border:1px solid var(--rule);overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead tr{border-bottom:2px solid var(--txt)}
.tbl th{
  font-family:var(--font-data);font-size:9px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);
  padding:8px 12px;text-align:left;white-space:nowrap;
  background:var(--bg2);
}
.tbl td{
  padding:10px 12px;border-bottom:1px solid var(--rule);
  vertical-align:middle;
}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--bg2)}
.tbl tbody tr{cursor:pointer}
.td-ticker{font-family:var(--font-data);font-size:13px;font-weight:600;color:var(--txt)}
.td-co{font-size:10px;color:var(--txt3)}
.td-mono{font-family:var(--font-data);font-size:11px}
.td-spark canvas{display:block}

/* ══ DETAIL OVERLAY ════════════════════════════════ */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:100;opacity:0;pointer-events:none;transition:opacity .18s;
}
#overlay.open{opacity:1;pointer-events:all}
#detail{
  position:fixed;top:0;right:0;bottom:0;
  width:min(720px,100vw);background:var(--surf);
  border-left:2px solid var(--txt);
  z-index:101;overflow-y:auto;
  transform:translateX(100%);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}
#detail.open{transform:translateX(0)}

.det-topbar{
  display:flex;align-items:stretch;
  border-bottom:2px solid var(--txt);
  position:sticky;top:0;background:var(--surf);z-index:2;
}
.det-title-wrap{flex:1;padding:12px 16px}
.det-tk{font-family:var(--font-data);font-size:18px;font-weight:600;color:var(--txt)}
.det-co{font-size:11px;color:var(--txt3);margin-top:2px}
.det-close{
  display:flex;align-items:center;justify-content:center;
  width:48px;background:none;border:none;border-left:1px solid var(--rule);
  color:var(--txt3);cursor:pointer;font-size:18px;
  transition:all .12s;
}
.det-close:hover{background:var(--bg3);color:var(--txt)}

.det-body{padding:0}

/* Detail section */
.dsec{border-bottom:1px solid var(--rule);padding:14px 16px}
.dsec-title{
  font-size:9px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;color:var(--txt3);margin-bottom:10px;
}

/* Status bar in detail */
.det-status-bar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--rule);
}
.det-pnl{font-family:var(--font-data);font-size:16px;font-weight:600}
.det-cur-p{font-family:var(--font-data);font-size:11px;color:var(--txt3)}

/* Levels grid in detail */
.det-levels{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--rule)}
.dlv{padding:10px 12px;border-right:1px solid var(--rule)}
.dlv:last-child{border-right:none}
.dlv-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:4px}
.dlv-p{font-family:var(--font-data);font-size:14px;font-weight:600;color:var(--txt)}
.dlv-pct{font-family:var(--font-data);font-size:10px;margin-top:2px}

/* Big chart */
.det-chart{height:220px;background:var(--bg2);border:1px solid var(--rule);margin-bottom:0}
canvas.bc{display:block;width:100%}

/* Signals */
.sig-row{display:flex;flex-wrap:wrap;gap:5px}
.sig{
  font-family:var(--font-data);font-size:9px;font-weight:500;
  padding:3px 8px;border:1px solid var(--rule2);
  background:var(--bg2);color:var(--txt2);
  text-transform:uppercase;letter-spacing:.3px;
}

/* Intel cells */
.intel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border:1px solid var(--rule)}
.intel-cell{padding:12px 13px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.intel-cell:nth-child(2n){border-right:none}
.intel-cell:nth-last-child(-n+2){border-bottom:none}
.ic-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.ic-body{font-size:11px;line-height:1.65;color:var(--txt2)}
.ic-green .ic-title{color:var(--bull)}
.ic-green{background:var(--bull-bg)}
.ic-blue .ic-title{color:var(--info-txt)}
.ic-blue{background:var(--info-bg)}
.ic-amber .ic-title{color:var(--warn-txt)}
.ic-amber{background:var(--warn-bg)}
.ic-purple .ic-title{color:var(--strc-txt)}
.ic-purple{background:var(--strc-bg)}

/* Thesis */
.thesis{
  font-size:12px;line-height:1.8;color:var(--txt2);
  padding:13px 14px;background:var(--bg2);
  border-left:2px solid var(--acc);
}

/* Tags */
.tag-row{display:flex;flex-wrap:wrap;gap:4px}
.tag{
  font-family:var(--font-data);font-size:9px;font-weight:500;
  padding:2px 7px;text-transform:uppercase;letter-spacing:.3px;
}
.tag-b{color:var(--bull-txt);background:var(--bull-bg);border:1px solid var(--bull)}
.tag-r{color:var(--bear-txt);background:var(--bear-bg);border:1px solid var(--bear)}
.tag-n{color:var(--txt3);background:var(--bg2);border:1px solid var(--rule2)}

/* Updates */
.update-item{padding:12px 14px;border-bottom:1px solid var(--rule)}
.update-item:last-child{border-bottom:none}
.upd-date{
  font-family:var(--font-data);font-size:9px;font-weight:600;
  text-transform:uppercase;letter-spacing:.6px;
  color:var(--acc);margin-bottom:5px;
}
.upd-price{color:var(--txt3)}
.upd-note{font-size:11px;color:var(--txt2);line-height:1.65;margin-bottom:5px}
.upd-dev{font-size:10px;color:var(--txt3);font-style:italic;line-height:1.6}

/* Analyst row */
.analyst-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  border:1px solid var(--rule);
}
.ar-cell{padding:8px 12px;border-right:1px solid var(--rule)}
.ar-cell:last-child{border-right:none}
.ar-k{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:3px}
.ar-v{font-family:var(--font-data);font-size:13px;font-weight:600;color:var(--txt)}

/* ══ LOADING ════════════════════════════════════════ */
#loading{
  display:flex;align-items:center;justify-content:center;
  height:60vh;flex-direction:column;gap:12px;
}
.loader-ring{
  width:32px;height:32px;border:2px solid var(--rule);
  border-top-color:var(--acc);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-family:var(--font-data);font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px}

/* ══ EMPTY ══════════════════════════════════════════ */
.empty{
  padding:48px 20px;text-align:center;
  font-family:var(--font-data);font-size:11px;
  color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;
  border:1px solid var(--rule);
}

/* ══ SVG ICONS ══════════════════════════════════════ */
.icon{display:inline-block;vertical-align:middle}

/* ══ RESPONSIVE ════════════════════════════════════ */
@media(max-width:760px){
  .page{padding:0 12px 48px}
  .pick-grid{grid-template-columns:1fr}
  .det-levels{grid-template-columns:repeat(2,1fr)}
  .intel-grid{grid-template-columns:1fr}
  .det-levels .dlv:nth-child(2){border-right:none}
  .det-levels .dlv:nth-child(n+3){border-top:1px solid var(--rule)}
  .intel-cell:nth-child(2n){border-right:none}
  .intel-cell{border-right:none}
  .perf-stats-row{grid-template-columns:repeat(2,1fr)}
  .topbar-status .status-cell:nth-child(n+4){display:none}
  #detail{width:100vw}
}
@media(max-width:480px){
  .mini-levels{grid-template-columns:repeat(2,1fr)}
  .ml:nth-child(2){border-right:none}
  .ml:nth-child(n+3){border-top:1px solid var(--rule)}
}
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-txt">Loading trade desk</div>
</div>

<div class="page" id="app" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div>
        <div class="brand-mark"><em>DT</em>360</div>
        <div class="brand-sub">Trade Desk</div>
      </div>
    </div>
    <div class="topbar-status" id="status-cells"></div>
    <div class="topbar-right">
      <button class="tbtn" onclick="toggleTheme()" id="tbtn">
        <svg id="ti" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <span id="tl">Dark</span>
      </button>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <div class="nav-tab on" onclick="showView('weekly',this)">This Week</div>
    <div class="nav-tab" onclick="showView('all',this)">All Picks</div>

          <th>Ticker</th><th>Added</th><th>Type</th>
          <th>Entry</th><th>Exit</th><th>P&amp;L</th>

<div id="overlay" onclick="closeDetail()"></div>
<div id="detail">
  <div class="det-topbar">
    <div class="det-title-wrap">
      <div class="det-tk" id="det-tk"></div>
      <div class="det-co" id="det-co"></div>
    </div>
    <button class="det-close" onclick="closeDetail()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div id="det-content"></div>
</div>

<script>
// ══ CONSTANTS ════════════════════════════════════════
const TYPE_COLORS = {monday:'#2255cc', wednesday:'#a86512'};
const RANK_COLORS = ['#2255cc','#169b5e','#a86512'];
const SUN  = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
const MOON = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

let ALL = [];

// ══ UTILS ════════════════════════════════════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const pct = (a,b) => { const v=(a-b)/b*100; return (v>=0?'+':'')+v.toFixed(2)+'%'; };
const pctV = (a,b) => (a-b)/b*100;
const fDate = d => new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const statusLabels = {active:'Active',hit_t1:'T1 Hit',hit_t2:'T2 Hit',stopped_out:'Stopped',closed:'Closed'};

function curPnl(p){
  if(p.pnl_pct!==null && p.pnl_pct!==undefined) return p.pnl_pct;
  const c=p.candles||[]; if(!c.length) return null;
  return pctV(c[c.length-1].c, p.entry);
}
function curPrice(p){
  if(p.exit_price) return p.exit_price;
  const c=p.candles||[]; return c.length?c[c.length-1].c:null;
}
function weekLabel(wid){
  const [y,wn]=wid.split('-W');
  const d=new Date(parseInt(y),0,1+(parseInt(wn)-1)*7);
  const opts={day:'numeric',month:'short',year:'numeric'};
  return 'W/C '+d.toLocaleDateString('en-GB',opts);
}

// ══ THEME ════════════════════════════════════════════
function toggleTheme(){
  const html=document.documentElement;
  const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('ti').innerHTML=dark?SUN:MOON;
  document.getElementById('tl').textContent=dark?'Dark':'Light';
  localStorage.setItem('dt360-theme',dark?'light':'dark');
  setTimeout(redrawAll,60);
}

// ══ TOPBAR STATUS ════════════════════════════════════
function renderStatusCells(picks){
  const active=picks.filter(p=>p.status==='active');
  const resolved=picks.filter(p=>p.pnl_pct!==null);
  const wins=resolved.filter(p=>p.pnl_pct>0);
  const wr=resolved.length?Math.round(wins.length/resolved.length*100):0;
  const avg=resolved.length?resolved.reduce((a,b)=>a+b.pnl_pct,0)/resolved.length:0;
  const latest=picks.length?fDate(picks.reduce((a,b)=>a.date_added>b.date_added?a:b).date_added):'--';

  document.getElementById('status-cells').innerHTML=[
    ['Last updated', latest, ''],
    ['Active', active.length, 'acc'],
    ['Win rate', wr+'%', wr>=50?'pos':'neg'],
    ['Avg P&L', (avg>=0?'+':'')+avg.toFixed(1)+'%', avg>=0?'pos':'neg'],
    ['Total picks', picks.length, ''],
  ].map(([k,v,cls])=>`
    <div class="status-cell">
      <div class="sc-label">${k}</div>
      <div class="sc-val ${cls}">${v}</div>
    </div>`).join('');
}

// ══ CHART RENDERERS ══════════════════════════════════
function drawMini(id, pick){
  const canvas=document.getElementById(id);
  if(!canvas) return;
  const candles=(pick.candles||[]).slice(-22);
  if(!candles.length) return;
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth||320, H=72;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const P={t:3,r:4,b:3,l:3};
  const cw=W-P.l-P.r, ch=H-P.t-P.b;
  let lo=Math.min(...candles.map(c=>c.l),pick.stop*.998);
  let hi=Math.max(...candles.map(c=>c.h),pick.t1*1.002);
  const pad=(hi-lo)*.06; lo-=pad; hi+=pad;
  const py=v=>P.t+ch*(1-(v-lo)/(hi-lo));
  const n=candles.length, gap=cw/n, cw2=Math.max(1.5,gap*.6), cx=i=>P.l+i*gap+gap/2;
  ctx.clearRect(0,0,W,H);
  // entry line
  const ec=TYPE_COLORS[pick.type]||'#2255cc';
  ctx.strokeStyle=dark?'rgba(34,85,204,.5)':'rgba(34,85,204,.4)';
  ctx.lineWidth=.8; ctx.setLineDash([3,2]);
  ctx.beginPath(); ctx.moveTo(P.l,py(pick.entry)); ctx.lineTo(W-P.r,py(pick.entry)); ctx.stroke();
  ctx.setLineDash([]);
  // stop
  ctx.strokeStyle=dark?'rgba(240,69,69,.4)':'rgba(184,32,32,.35)';
  ctx.lineWidth=.7; ctx.setLineDash([2,2]);
  ctx.beginPath(); ctx.moveTo(P.l,py(pick.stop)); ctx.lineTo(W-P.r,py(pick.stop)); ctx.stroke();
  ctx.setLineDash([]);
  const bC=dark?'#28b85a':'#1a7a3e', rC=dark?'#f04545':'#b82020';
  for(let i=0;i<n;i++){
    const c=candles[i],x=cx(i),bull=c.c>=c.o,col=bull?bC:rC;
    const bT=py(Math.max(c.o,c.c)),bB=py(Math.min(c.o,c.c)),bH=Math.max(1,bB-bT);
    ctx.strokeStyle=col; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.moveTo(x,py(c.h)); ctx.lineTo(x,py(c.l)); ctx.stroke();
    ctx.fillStyle=col; ctx.fillRect(x-cw2/2,bT,cw2,bH);
  }
}

function drawBig(id, pick){
  const canvas=document.getElementById(id);
  if(!canvas) return;
  const candles=pick.candles||[];
  if(!candles.length) return;
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth||660, H=220;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const P={t:12,r:58,b:24,l:6};
  const cw=W-P.l-P.r, ch=H-P.t-P.b;
  let lo=Math.min(...candles.map(c=>c.l),pick.stop*.997);
  let hi=Math.max(...candles.map(c=>c.h),pick.t2*1.003);
  const pad=(hi-lo)*.07; lo-=pad; hi+=pad;
  const rng=hi-lo;
  const py=v=>P.t+ch*(1-(v-lo)/rng);
  const n=candles.length, gap=cw/n, cw2=Math.max(2,gap*.65), cx=i=>P.l+i*gap+gap/2;
  const gc=dark?'rgba(255,255,255,.03)':'rgba(0,0,0,.04)';
  const tc=dark?'rgba(255,255,255,.25)':'rgba(0,0,0,.28)';
  const bC=dark?'#28b85a':'#1a7a3e', rC=dark?'#f04545':'#b82020';
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){const y=P.t+ch*(i/4);ctx.strokeStyle=gc;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();}
  const zx=cx(n-1)-cw2*.5, zw=W-P.r+8-zx;
  ctx.fillStyle=dark?'rgba(40,184,90,.07)':'rgba(26,122,62,.07)';
  ctx.fillRect(zx,py(pick.t2),zw,py(pick.entry)-py(pick.t2));
  ctx.fillStyle=dark?'rgba(240,69,69,.07)':'rgba(184,32,32,.07)';
  ctx.fillRect(zx,py(pick.entry),zw,py(pick.stop)-py(pick.entry));
  for(let i=0;i<n;i++){
    const c=candles[i],x=cx(i),bull=c.c>=c.o,col=bull?bC:rC;
    const bT=py(Math.max(c.o,c.c)),bB=py(Math.min(c.o,c.c)),bH=Math.max(1,bB-bT);
    ctx.strokeStyle=col; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,py(c.h)); ctx.lineTo(x,py(c.l)); ctx.stroke();
    ctx.fillStyle=col; ctx.fillRect(x-cw2/2,bT,cw2,bH);
  }
  const last=candles[n-1].c;
  ctx.strokeStyle=dark?'rgba(255,255,255,.15)':'rgba(0,0,0,.12)';
  ctx.lineWidth=.7; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(P.l,py(last)); ctx.lineTo(W-P.r,py(last)); ctx.stroke();
  ctx.setLineDash([]);
  const acc=TYPE_COLORS[pick.type]||'#2255cc';
  function lvl(price,col,label,dashed){
    const y=py(price);
    ctx.strokeStyle=col; ctx.lineWidth=1;
    ctx.setLineDash(dashed?[4,3]:[]);
    ctx.beginPath(); ctx.moveTo(P.l,y); ctx.lineTo(W-P.r,y); ctx.stroke();
    ctx.setLineDash([]);
    const lx=W-P.r+1, lw=P.r-2, lh=14;
    ctx.fillStyle=col;
    ctx.fillRect(lx,y-lh/2,lw,lh);
    ctx.fillStyle='#fff'; ctx.font='bold 8px "IBM Plex Mono",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,lx+lw/2,y);
  }
  lvl(pick.t2,'#1a7a3e','T2',true);
  lvl(pick.t1,bC,'T1',true);
  lvl(pick.entry,acc,'ENTRY',false);
  lvl(pick.stop,rC,'STOP',true);
  ctx.fillStyle=tc; ctx.font='8px "IBM Plex Mono",monospace';
  ctx.textAlign='center'; ctx.textBaseline='top';
  for(let i=0;i<n;i+=8) ctx.fillText(candles[i].t.slice(5,10),cx(i),H-P.b+3);
  ctx.fillStyle=dark?'rgba(255,255,255,.2)':'rgba(0,0,0,.2)';
  ctx.font='bold 10px "IBM Plex Mono",monospace';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(pick.ticker+' 4H',P.l+4,P.t+2);
}

function drawSpark(id, pick){
  const canvas=document.getElementById(id);
  if(!canvas) return;
  const closes=(pick.candles||[]).slice(-14).map(c=>c.c);
  if(!closes.length) return;
  const dpr=window.devicePixelRatio||1;
  const W=70, H=26;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const lo=Math.min(...closes), hi=Math.max(...closes), rng=hi-lo||1;
  const py=v=>(H-4)*(1-(v-lo)/rng)+2;
  const pnl=curPnl(pick);
  const col=pnl===null?'#888680':pnl>=0?'#1a7a3e':'#b82020';
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.beginPath();
  closes.forEach((v,i)=>{const x=i*(W/closes.length)+W/(closes.length*2);i===0?ctx.moveTo(x,py(v)):ctx.lineTo(x,py(v));});
  ctx.stroke();
}

// ══ BUILD CARD ════════════════════════════════════════
function buildCard(p){
  const acc=TYPE_COLORS[p.type]||'#2255cc';
  const pnl=curPnl(p);
  const curP=curPrice(p);
  const hasUpd=(p.updates||[]).length>0;
  const pnlHtml=pnl!==null
    ?`<span class="pnl-val ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}${pnl.toFixed(2)}%</span>`
    :`<span class="pnl-val neu">--</span>`;
  return `
  <div class="pcard" onclick="openDetail('${esc(p.id)}')" id="card-${esc(p.id)}">
    <div class="pcard-accent-bar" style="background:${acc}"></div>
    <div class="pcard-body">
      <div class="pcard-hdr">
        <div>
          <div class="pcard-tk">${esc(p.ticker)}</div>
          <div class="pcard-co">${esc(p.company)}</div>
        </div>
        <div class="pcard-meta-r">
          <div class="pconv">${p.conviction||'--'}</div>
          <div class="pconv-lbl">Conv</div>
        </div>
      </div>
      <div class="pcard-status-row">
        <span class="status-tag st-${p.status}">${statusLabels[p.status]||p.status}</span>
        <span class="pcard-date" style="color:${acc}">
          <span class="type-dot" style="background:${acc}"></span>${p.type==='monday'?'Mon':'Wed'} ${fDate(p.date_added)}
        </span>
        ${hasUpd?`<span class="pcard-upd">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.01-9.02"/></svg>
          Updated</span>`:''}
      </div>
      <div class="mini-chart-wrap"><canvas class="mc" id="mc-${esc(p.id)}"></canvas></div>
      <div class="mini-levels">
        <div class="ml"><div class="ml-lbl">Entry</div><div class="ml-p">$${p.entry}</div></div>
        <div class="ml"><div class="ml-lbl">Stop</div><div class="ml-p" style="color:var(--bear)">$${p.stop}</div><div class="ml-pct" style="color:var(--bear)">${pct(p.stop,p.entry)}</div></div>
        <div class="ml"><div class="ml-lbl">T1</div><div class="ml-p" style="color:var(--bull)">$${p.t1}</div><div class="ml-pct" style="color:var(--bull)">${pct(p.t1,p.entry)}</div></div>
        <div class="ml"><div class="ml-lbl">T2</div><div class="ml-p" style="color:var(--bull)">$${p.t2}</div><div class="ml-pct" style="color:var(--bull)">${pct(p.t2,p.entry)}</div></div>
      </div>
      <div class="pcard-pnl">
        ${pnlHtml}
        ${curP?`<span class="neu" style="font-size:10px">$${curP} now</span>`:''}
        <span class="neu" style="font-size:10px;margin-left:auto">R:R ${p.rr}x</span>
      </div>
    </div>
  </div>`;
}

// ══ WEEKLY VIEW ══════════════════════════════════════
function renderWeekly(picks){
  const weeks={};
  picks.forEach(p=>{ (weeks[p.week_id]||(weeks[p.week_id]=[])).push(p); });
  let html='';
  Object.entries(weeks).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([wid,wps])=>{
    const active=wps.filter(p=>p.status==='active').length;
    const stopped=wps.filter(p=>p.status==='stopped_out').length;
    const won=wps.filter(p=>p.status==='hit_t1'||p.status==='hit_t2').length;
    const cpnls=wps.filter(p=>p.pnl_pct!==null).map(p=>p.pnl_pct);
    const avg=cpnls.length?cpnls.reduce((a,b)=>a+b,0)/cpnls.length:null;
    html+=`
    <div class="week-section">
      <div class="week-header">
        <div class="week-label">${weekLabel(wid)} <span style="color:var(--txt3);font-weight:400">${wid}</span></div>
        <div class="week-meta">
          ${active?`<div class="wm-item"><b style="color:var(--bull)">${active}</b> active</div>`:''}
          ${won?`<div class="wm-item pos"><b>${won}</b> won</div>`:''}
          ${stopped?`<div class="wm-item neg"><b>${stopped}</b> stopped</div>`:''}
          ${avg!==null?`<div class="wm-item ${avg>=0?'pos':'neg'}"><b>${avg>=0?'+':''}${avg.toFixed(1)}%</b> avg</div>`:''}
        </div>
      </div>
      <div class="pick-grid">${wps.map(buildCard).join('')}</div>
    </div>`;
  });
  document.getElementById('view-weekly').innerHTML=html||`<div class="empty">No picks this week yet.</div>`;
  picks.forEach(p=>setTimeout(()=>drawMini(`mc-${p.id}`,p),50));
}

// ══ ALL PICKS FILTER ══════════════════════════════════
function filterAll(){
  const q=(document.getElementById('s-input')?.value||'').toLowerCase();
  const st=document.getElementById('s-status')?.value||'';
  const tp=document.getElementById('s-type')?.value||'';
  const so=document.getElementById('s-sort')?.value||'date_desc';
  let f=ALL.filter(p=>{
    const mq=!q||p.ticker.toLowerCase().includes(q)||p.company.toLowerCase().includes(q);
    const ms=!st||p.status===st;
    const mt=!tp||p.type===tp;
    return mq&&ms&&mt;
  });
  f.sort((a,b)=>{
    if(so==='date_desc') return b.date_added.localeCompare(a.date_added);
    if(so==='date_asc')  return a.date_added.localeCompare(b.date_added);
    if(so==='conviction') return (b.conviction||0)-(a.conviction||0);
    if(so==='pnl'){ const pa=curPnl(a)??-999,pb=curPnl(b)??-999; return pb-pa; }
    if(so==='ticker') return a.ticker.localeCompare(b.ticker);
    return 0;
  });
  document.getElementById('all-grid').innerHTML=f.length
    ?f.map(buildCard).join('')
    :`<div class="empty" style="grid-column:1/-1">No picks match the current filters.</div>`;
  document.getElementById('fcount').textContent=`${f.length} picks`;
  f.forEach(p=>setTimeout(()=>drawMini(`mc-${p.id}`,p),50));
}

// ══ PERFORMANCE VIEW ══════════════════════════════════
function renderPerf(picks){
  const resolved=picks.filter(p=>p.pnl_pct!==null);
  const wins=resolved.filter(p=>p.pnl_pct>0);
  const losses=resolved.filter(p=>p.pnl_pct<=0);
  const active=picks.filter(p=>p.status==='active');
  const pnls=resolved.map(p=>p.pnl_pct);
  const avg=pnls.length?pnls.reduce((a,b)=>a+b,0)/pnls.length:0;
  const wr=resolved.length?wins.length/resolved.length*100:0;
  const best=pnls.length?Math.max(...pnls):0;
  const worst=pnls.length?Math.min(...pnls):0;

  document.getElementById('perf-stats').innerHTML=[
    ['Total picks', picks.length, `${active.length} active`],
    ['Win rate',    wr.toFixed(0)+'%', `${wins.length}W / ${losses.length}L`],
    ['Avg P&L',     (avg>=0?'+':'')+avg.toFixed(2)+'%', 'closed trades'],
    ['Best trade',  '+'+best.toFixed(2)+'%', picks.find(p=>p.pnl_pct===best)?.ticker||''],
    ['Worst trade', worst.toFixed(2)+'%',    picks.find(p=>p.pnl_pct===worst)?.ticker||''],
    ['Active',      active.length, active.map(p=>p.ticker).join(', ')||'none'],
  ].map(([k,v,s])=>`
    <div class="stat-cell">
      <div class="stat-k">${k}</div>
      <div class="stat-v" style="${k==='Best trade'?'color:var(--bull)':k==='Worst trade'?'color:var(--bear)':''}">${v}</div>
      <div class="stat-sub">${s}</div>
    </div>`).join('');

  const sorted=[...picks].sort((a,b)=>b.date_added.localeCompare(a.date_added));
  document.getElementById('perf-tbody').innerHTML=sorted.map(p=>{
    const pnl=curPnl(p);
    const cls=pnl===null?'neu':pnl>=0?'pos':'neg';
    const pnlStr=pnl!==null?`<span class="${cls} td-mono">${pnl>=0?'+':''}${pnl.toFixed(2)}%</span>`:`<span class="neu td-mono">active</span>`;
    const exitStr=p.exit_price?`<span class="td-mono">$${p.exit_price}</span>`:`<span class="neu td-mono">--</span>`;
    return `<tr onclick="openDetail('${esc(p.id)}')" style="cursor:pointer">
      <td><div class="td-ticker">${esc(p.ticker)}</div><div class="td-co">${esc(p.company)}</div></td>
      <td class="td-mono" style="color:var(--txt3);font-size:10px">${fDate(p.date_added)}</td>
      <td><span style="font-size:9px;font-family:var(--font-data);text-transform:uppercase;letter-spacing:.3px;color:${TYPE_COLORS[p.type]||'#888'}">${p.type}</span></td>
      <td class="td-mono">$${p.entry}</td>
      <td>${exitStr}</td>
      <td>${pnlStr}</td>
      <td><span class="status-tag st-${p.status}" style="font-size:8px">${statusLabels[p.status]||p.status}</span></td>
      <td class="td-mono" style="color:var(--txt3)">${p.rr}x</td>
      <td class="td-mono">${p.conviction||'--'}</td>
      <td><canvas class="td-spark" id="sp-${esc(p.id)}" width="70" height="26"></canvas></td>
    </tr>`;
  }).join('');
  sorted.forEach(p=>setTimeout(()=>drawSpark(`sp-${p.id}`,p),60));
}

// ══ DETAIL PANEL ══════════════════════════════════════
function openDetail(id){
  const p=ALL.find(x=>x.id===id); if(!p) return;
  const acc=TYPE_COLORS[p.type]||'#2255cc';
  const pnl=curPnl(p), curP=curPrice(p);
  const a=p.analyst||{}, m=p.meta||{};

  document.getElementById('det-tk').innerHTML=`<span style="color:${acc}">${esc(p.ticker)}</span>`;
  document.getElementById('det-co').textContent=`${p.company} · ${p.sector}`;

  const intelHtml=(p.intel||[]).map(c=>`
    <div class="intel-cell ic-${esc(c.type)}">
      <div class="ic-title">${esc(c.title)}</div>
      <div class="ic-body">${esc(c.body)}</div>
    </div>`).join('');

  const tagsHtml=[
    ...(p.tags_bull||[]).filter(Boolean).map(t=>`<span class="tag tag-b">${esc(t)}</span>`),
    ...(p.tags_risk||[]).filter(Boolean).map(t=>`<span class="tag tag-r">${esc(t)}</span>`),
    ...(p.tags_neutral||[]).filter(Boolean).map(t=>`<span class="tag tag-n">${esc(t)}</span>`),
  ].join('');

  const metaHtml=Object.entries(m).map(([k,v])=>`<span class="sig">${k.replace(/_/g,' ')}: ${esc(String(v))}</span>`).join('');

  const updatesHtml=(p.updates||[]).length
    ?(p.updates||[]).map(u=>`
      <div class="update-item">
        <div class="upd-date">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-right:4px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.01-9.02"/></svg>
          Wed ${fDate(u.date)} <span class="upd-price">· $${u.price_then}</span>
        </div>
        <div class="upd-note">${esc(u.note)}</div>
        ${u.developments?`<div class="upd-dev">${esc(u.developments)}</div>`:''}
      </div>`).join('')
    :`<div class="update-item"><div class="upd-dev">No Wednesday updates for this pick yet.</div></div>`;

  const analystHtml=a.rating&&a.rating!=='EDIT'?`
    <div class="analyst-row">
      <div class="ar-cell"><div class="ar-k">Rating</div><div class="ar-v" style="color:${acc}">${esc(a.rating)}</div></div>
      <div class="ar-cell"><div class="ar-k">Buy / Hold / Sell</div><div class="ar-v">${a.n_buy}B / ${a.n_hold}H / ${a.n_sell}S</div></div>
      <div class="ar-cell"><div class="ar-k">Avg PT</div><div class="ar-v">$${a.pt_avg}</div></div>
      <div class="ar-cell"><div class="ar-k">Upside</div><div class="ar-v" style="color:var(--bull)">+${a.upside}%</div></div>
    </div>`:'';

  document.getElementById('det-content').innerHTML=`
    <div class="det-status-bar">
      <span class="status-tag st-${p.status}">${statusLabels[p.status]||p.status}</span>
      ${pnl!==null?`<span class="det-pnl ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}${pnl.toFixed(2)}%</span>`:''}
      ${curP?`<span class="det-cur-p">$${curP} now</span>`:''}
      <span style="margin-left:auto;font-family:var(--font-data);font-size:10px;color:var(--txt3)">${p.type==='monday'?'Monday pick':'Wednesday update'} · ${fDate(p.date_added)}</span>
    </div>

    <div class="dsec">
      <div class="dsec-title">4H Chart</div>
      <div class="det-chart"><canvas class="bc" id="bc-${esc(p.id)}"></canvas></div>
    </div>

    <div class="dsec">
      <div class="dsec-title">Trade levels · ATR $${p.atr} · R:R ${p.rr}x</div>
      <div class="det-levels">
        <div class="dlv"><div class="dlv-l">Entry</div><div class="dlv-p">$${p.entry}</div><div class="dlv-pct" style="color:var(--txt3)">ref</div></div>
        <div class="dlv"><div class="dlv-l">Stop</div><div class="dlv-p" style="color:var(--bear)">$${p.stop}</div><div class="dlv-pct" style="color:var(--bear)">${pct(p.stop,p.entry)}</div></div>
        <div class="dlv"><div class="dlv-l">Target 1</div><div class="dlv-p" style="color:var(--bull)">$${p.t1}</div><div class="dlv-pct" style="color:var(--bull)">${pct(p.t1,p.entry)}</div></div>
        <div class="dlv"><div class="dlv-l">Target 2</div><div class="dlv-p" style="color:var(--bull)">$${p.t2}</div><div class="dlv-pct" style="color:var(--bull)">${pct(p.t2,p.entry)}</div></div>
      </div>
    </div>

    <div class="dsec">
      <div class="dsec-title">Technical signals</div>
      <div class="sig-row">${(p.signals||[]).map(s=>`<span class="sig">${esc(s)}</span>`).join('')}</div>
    </div>

    <div class="dsec">
      <div class="dsec-title">Fundamentals</div>
      <div class="sig-row">${metaHtml}</div>
    </div>

    ${analystHtml?`<div class="dsec"><div class="dsec-title">Analyst consensus</div>${analystHtml}</div>`:''}

    <div class="dsec">
      <div class="dsec-title">Intelligence</div>
      <div class="intel-grid">${intelHtml}</div>
    </div>

    <div class="dsec">
      <div class="dsec-title">Tags</div>
      <div class="tag-row" style="margin-bottom:12px">${tagsHtml}</div>
      <div class="dsec-title">Thesis</div>
      <div class="thesis">${esc(p.thesis||'')}</div>
    </div>

    <div class="dsec">
      <div class="dsec-title">Wednesday updates (${(p.updates||[]).length})</div>
      ${updatesHtml}
    </div>
  `;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('detail').classList.add('open');
  setTimeout(()=>drawBig(`bc-${p.id}`,p),80);
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail').classList.remove('open');
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDetail(); });

// ══ REDRAW ALL ════════════════════════════════════════
function redrawAll(){
  ALL.forEach(p=>{
    const mc=document.getElementById(`mc-${p.id}`);
    if(mc&&mc.parentElement?.clientWidth>0) drawMini(`mc-${p.id}`,p);
    const bc=document.getElementById(`bc-${p.id}`);
    if(bc&&bc.parentElement?.clientWidth>0) drawBig(`bc-${p.id}`,p);
    const sp=document.getElementById(`sp-${p.id}`);
    if(sp) drawSpark(`sp-${p.id}`,p);
  });
}

// ══ VIEWS ════════════════════════════════════════════
function showView(name,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('view-'+name).classList.add('on');
  if(el) el.classList.add('on');
  setTimeout(redrawAll,80);
}

// ══ INIT ══════════════════════════════════════════════
(function init(){
  const saved=localStorage.getItem('dt360-theme');
  if(saved==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('ti').innerHTML=MOON;
    document.getElementById('tl').textContent='Light';
  }

  fetch('picks.json?v='+Date.now())
    .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(picks=>{
      ALL=picks;
      renderStatusCells(picks);
      renderWeekly(picks);
      filterAll();
      renderPerf(picks);
      document.getElementById('loading').style.display='none';
      document.getElementById('app').style.display='block';
    })
    .catch(err=>{
      document.getElementById('loading').innerHTML=`
        <div style="font-family:var(--font-data);font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px">
          Failed to load picks.json<br><span style="color:var(--bear)">${err}</span>
        </div>`;
    });

  window.addEventListener('resize',()=>setTimeout(redrawAll,100));
})();
</script>
</body>
</html>
