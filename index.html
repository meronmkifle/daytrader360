<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>@daytrader_360</title>
<style>
/* ── TOKENS ─────────────────────────────────────── */
:root{
  --bg:#f0efe9;--surf:#fff;--surf2:#f6f5f0;--surf3:#eceae3;
  --brd:rgba(0,0,0,0.09);--brd2:rgba(0,0,0,0.16);
  --txt:#0f0f0e;--txt2:#4a4845;--txt3:#8f8d89;
  --bull:#158a52;--bear:#c43535;
  --bull-bg:rgba(21,138,82,.09);--bear-bg:rgba(196,53,53,.09);
  --bull-dk:#0a4f2e;--bear-dk:#6e1818;
  --info-bg:#e5edfb;--info-brd:#aec6f5;--info-txt:#163572;
  --warn-bg:#fdf1dc;--warn-brd:#f0c55c;--warn-txt:#6a3900;
  --strc-bg:#ebebfd;--strc-brd:#bbb8f8;--strc-txt:#312a92;
  --acc1:#2a7dd4;--acc2:#169b5e;--acc3:#a86512;
  --r:9px;--rl:13px;
  --sh:0 1px 2px rgba(0,0,0,.05),0 3px 10px rgba(0,0,0,.04);
}
[data-theme=dark]{
  --bg:#0c0c0b;--surf:#181816;--surf2:#1f1f1d;--surf3:#272725;
  --brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.12);
  --txt:#edeae3;--txt2:#9c9994;--txt3:#5e5c58;
  --bull:#1fc87a;--bear:#f04f4f;
  --bull-bg:rgba(31,200,122,.11);--bear-bg:rgba(240,79,79,.11);
  --bull-dk:#6efbb6;--bear-dk:#fca5a5;
  --info-bg:#0d1d3a;--info-brd:#1b3868;--info-txt:#7ab4f8;
  --warn-bg:#261900;--warn-brd:#5a3c00;--warn-txt:#f5b84a;
  --strc-bg:#18133a;--strc-brd:#362c72;--strc-txt:#b4a8ff;
  --sh:0 1px 2px rgba(0,0,0,.3),0 3px 10px rgba(0,0,0,.25);
}

/* ── RESET ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--txt);
  line-height:1.5;min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background .2s,color .2s;
}

/* ── LAYOUT ─────────────────────────────────────── */
.page{max-width:1120px;margin:0 auto;padding:0 24px 64px}

/* ── TOPBAR ─────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 0 18px;border-bottom:1px solid var(--brd);
  margin-bottom:22px;gap:12px;flex-wrap:wrap;
}
.topbar-l{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-size:18px;font-weight:700;color:var(--txt);letter-spacing:-.2px}
.logo em{font-style:normal;color:var(--acc1)}
.dbadge{
  font-family:'SF Mono','Fira Code',monospace;
  font-size:11px;color:var(--txt3);
  background:var(--surf2);border:1px solid var(--brd);
  padding:4px 10px;border-radius:6px;
  letter-spacing:.2px;
}
.tbtn{
  display:flex;align-items:center;gap:7px;
  background:var(--surf);border:1px solid var(--brd2);
  border-radius:8px;padding:8px 16px;
  font-family:inherit;font-size:13px;font-weight:500;
  color:var(--txt2);cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.tbtn:hover{background:var(--surf2);color:var(--txt)}
.tbtn svg{width:15px;height:15px;flex-shrink:0}

/* ── TABS ───────────────────────────────────────── */
.tabs{display:flex;gap:5px;margin-bottom:28px;flex-wrap:wrap}
.tab{
  font-family:inherit;font-size:13px;font-weight:500;
  padding:8px 20px;border-radius:8px;
  border:1px solid var(--brd);background:var(--surf);
  color:var(--txt2);cursor:pointer;transition:all .15s;
}
.tab:hover{background:var(--surf2);color:var(--txt)}
.tab.on{background:var(--txt);color:var(--bg);border-color:var(--txt)}

/* ── CARD ───────────────────────────────────────── */
.card{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--rl);margin-bottom:28px;
  overflow:hidden;box-shadow:var(--sh);
  transition:background .2s,border-color .2s;
}
.accent{height:4px}
.body{padding:26px 28px}

/* ── CARD HEADER ────────────────────────────────── */
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
.pick-lbl{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.ticker{font-size:32px;font-weight:700;color:var(--txt);letter-spacing:-.5px;line-height:1}
.coname{font-size:13px;color:var(--txt2);margin-top:5px}
.conv-wrap{text-align:right;flex-shrink:0}
.conv-num{font-family:'SF Mono','Fira Code',monospace;font-size:36px;font-weight:600;color:var(--txt);line-height:1}
.conv-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);margin-top:3px}

/* ── META CHIPS ─────────────────────────────────── */
.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.chip{
  font-family:'SF Mono','Fira Code',monospace;
  font-size:11px;font-weight:400;
  padding:4px 10px;border-radius:5px;
  background:var(--surf2);color:var(--txt2);
  border:1px solid var(--brd);white-space:nowrap;
}

/* ── CHART ──────────────────────────────────────── */
.chart-wrap{
  background:var(--surf2);border:1px solid var(--brd);
  border-radius:var(--r);overflow:hidden;margin-bottom:22px;
}
canvas.cv{display:block;width:100%}

/* ── LEVELS ─────────────────────────────────────── */
.levels{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:18px}
.level{
  background:var(--surf2);border:1px solid var(--brd);
  border-radius:var(--r);padding:14px 16px;text-align:center;
}
.lv-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:6px}
.lv-price{font-family:'SF Mono','Fira Code',monospace;font-size:17px;font-weight:600;color:var(--txt)}
.lv-pct{font-family:'SF Mono','Fira Code',monospace;font-size:11px;margin-top:4px}

/* ── SIGNALS ────────────────────────────────────── */
.signals{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px}
.sig{
  font-size:11px;font-weight:500;
  padding:4px 10px;border-radius:5px;
  background:var(--surf2);color:var(--txt2);
  border:1px solid var(--brd);white-space:nowrap;
}

/* ── SECTION TITLE ──────────────────────────────── */
.s-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);margin:0 0 11px}

/* ── BARS ───────────────────────────────────────── */
.bars{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:22px}
.bar-item{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:12px 14px}
.bar-hdr{display:flex;justify-content:space-between;margin-bottom:7px}
.bar-nm{font-size:12px;color:var(--txt2)}
.bar-vl{font-family:'SF Mono','Fira Code',monospace;font-size:12px;font-weight:600;color:var(--txt)}
.bar-track{height:4px;background:var(--brd);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}

/* ── INTEL ──────────────────────────────────────── */
.intel{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:22px}
.intel-cell{border-radius:var(--r);padding:14px 16px;border:1px solid}
.ic-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.ic-body{font-size:12px;line-height:1.7}
.ic-green{background:var(--bull-bg);border-color:rgba(21,138,82,.22);color:var(--bull-dk)}
.ic-blue {background:var(--info-bg);border-color:var(--info-brd);color:var(--info-txt)}
.ic-amber{background:var(--warn-bg);border-color:var(--warn-brd);color:var(--warn-txt)}
.ic-purple{background:var(--strc-bg);border-color:var(--strc-brd);color:var(--strc-txt)}

/* ── TAGS ───────────────────────────────────────── */
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:5px}
.tag-b{background:var(--bull-bg);color:var(--bull-dk)}
.tag-r{background:var(--bear-bg);color:var(--bear-dk)}
.tag-n{background:var(--surf2);color:var(--txt2);border:1px solid var(--brd)}

/* ── THESIS ─────────────────────────────────────── */
.thesis{
  font-size:13px;line-height:1.8;color:var(--txt2);
  background:var(--surf2);border-radius:var(--r);
  padding:16px 18px;border-left:3px solid var(--brd2);
}

/* ── MARKET STRIP ───────────────────────────────── */
.mkt{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--rl);padding:18px 24px;
  margin-bottom:22px;box-shadow:var(--sh);
}
.mkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px 20px}
.mkt-k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px}
.mkt-v{font-size:13px;font-weight:500;color:var(--txt)}

/* ── INTEL-ONLY divider ─────────────────────────── */
.i-div{font-size:14px;font-weight:700;color:var(--txt);padding-bottom:12px;border-bottom:1px solid var(--brd);margin:0 0 16px}

/* ── FOOTER ─────────────────────────────────────── */
.foot{text-align:center;font-size:11px;color:var(--txt3);letter-spacing:.3px;padding:20px 0 0;border-top:1px solid var(--brd)}

/* ── LOADING ────────────────────────────────────── */
#loading{text-align:center;padding:60px 20px;font-size:14px;color:var(--txt3)}
#loading span{display:block;font-size:24px;margin-bottom:10px}

/* ── RESPONSIVE ─────────────────────────────────── */
@media(max-width:720px){
  .page{padding:0 16px 44px}
  .body{padding:18px 18px}
  .ticker{font-size:26px}.conv-num{font-size:28px}
  .levels{grid-template-columns:repeat(2,1fr)}
  .bars{grid-template-columns:1fr}
  .intel{grid-template-columns:1fr}
  .mkt-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:420px){
  .levels{grid-template-columns:repeat(2,1fr)}
  .lv-price{font-size:14px}
}
</style>
</head>
<body>

<div class="page">
  <div id="loading"><span>⟳</span>Loading picks...</div>
  <div id="app" style="display:none">

    <div class="topbar">
      <div class="topbar-l">
        <div class="logo"><em>@</em>daytrader_360</div>
        <div class="dbadge" id="hdr-date">Loading...</div>
      </div>
      <button class="tbtn" onclick="toggleTheme()" id="tbtn">
        <svg id="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <span id="tl">Dark mode</span>
      </button>
    </div>

    <div class="tabs">
      <div class="tab on" onclick="sv('all',this)">All picks</div>
      <div class="tab" onclick="sv('setup',this)">Setup only</div>
      <div class="tab" onclick="sv('intel',this)">Intelligence</div>
    </div>

    <div id="va"></div>
    <div id="vs" style="display:none"></div>
    <div id="vi" style="display:none"></div>

    <div class="mkt" id="mkt-strip"></div>
    <div class="foot">Not financial advice &middot; DYOR &middot; Stops 1.5&times; ATR &middot; Targets 2&times; / 3.5&times; ATR &middot; @daytrader_360</div>
  </div>
</div>

<script>
// ── ACCENT COLORS ────────────────────────────────
const ACCENTS = ['#2a7dd4','#169b5e','#a86512'];

// ── CONVICTION LABEL ─────────────────────────────
function convLabel(rank){
  return ['Highest Conviction','Top Composite Score','Good Conviction'][rank-1] || '';
}

// ── ESCAPE HTML ──────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ── BUILD CARD HTML ──────────────────────────────
function buildCard(p, mode='all'){
  const acc = ACCENTS[p.rank-1];
  const a   = p.analyst || {};
  const m   = p.meta    || {};

  const levelBlock = `
    <div class="levels">
      <div class="level"><div class="lv-lbl">Entry</div><div class="lv-price">$${p.price}</div><div class="lv-pct" style="color:var(--txt3)">market price</div></div>
      <div class="level"><div class="lv-lbl">Stop Loss</div><div class="lv-price" style="color:var(--bear)">$${p.stop}</div><div class="lv-pct" style="color:var(--bear)">${pct(p.stop, p.price)}</div></div>
      <div class="level"><div class="lv-lbl">Target 1</div><div class="lv-price" style="color:var(--bull)">$${p.t1}</div><div class="lv-pct" style="color:var(--bull)">+${pct(p.t1, p.price, true)}</div></div>
      <div class="level"><div class="lv-lbl">Target 2</div><div class="lv-price" style="color:var(--bull)">$${p.t2}</div><div class="lv-pct" style="color:var(--bull)">+${pct(p.t2, p.price, true)}</div></div>
    </div>`;

  const signalBlock = `<div class="signals">${(p.signals||[]).map(s=>`<span class="sig">${esc(s)}</span>`).join('')}</div>`;

  const chartBlock = `<div class="chart-wrap" id="cw-${p.ticker}-${mode}"><canvas class="cv" id="cv-${p.ticker}-${mode}" height="280"></canvas></div>`;

  if(mode==='setup') return `
    <div class="card" style="border-top:4px solid ${acc}">
      <div class="body">
        <div class="card-hdr">
          <div><div class="pick-lbl">Pick ${p.rank} · ${convLabel(p.rank)}</div>
            <div class="ticker">${p.ticker} <span style="font-size:17px;font-weight:400;color:var(--txt2)">$${p.price}</span></div>
          </div>
          <div class="conv-wrap"><div class="conv-num">${p.conviction}</div><div class="conv-lbl">conviction</div></div>
        </div>
        ${chartBlock}${levelBlock}${signalBlock}
      </div>
    </div>`;

  const barsBlock = `
    <div class="s-title">Conviction Breakdown</div>
    <div class="bars">
      <div class="bar-item"><div class="bar-hdr"><span class="bar-nm">Technical (${p.score}/20)</span><span class="bar-vl">${(p.conv_bars||{}).technical||0}/40</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(((p.conv_bars||{}).technical||0)/40*100)}%;background:${acc}"></div></div></div>
      <div class="bar-item"><div class="bar-hdr"><span class="bar-nm">Analyst Consensus</span><span class="bar-vl">${(p.conv_bars||{}).analyst||0}/30</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(((p.conv_bars||{}).analyst||0)/30*100)}%;background:${acc}"></div></div></div>
      <div class="bar-item"><div class="bar-hdr"><span class="bar-nm">PT Upside (+${a.upside||0}%)</span><span class="bar-vl">${(p.conv_bars||{}).pt_upside||0}/15</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(((p.conv_bars||{}).pt_upside||0)/15*100)}%;background:${acc}"></div></div></div>
      <div class="bar-item"><div class="bar-hdr"><span class="bar-nm">Non-conventional Intel</span><span class="bar-vl">${(p.conv_bars||{}).non_conv||0}/15</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(((p.conv_bars||{}).non_conv||0)/15*100)}%;background:${acc}"></div></div></div>
    </div>`;

  const intelBlock = `
    <div class="s-title">Intelligence Grid</div>
    <div class="intel">
      ${(p.intel||[]).map(c=>`<div class="intel-cell ic-${c.type}"><div class="ic-title">${esc(c.title)}</div><div class="ic-body">${esc(c.body)}</div></div>`).join('')}
    </div>`;

  const tagsBlock = `
    <div class="tag-row">
      ${(p.tags_bull||[]).filter(Boolean).map(t=>`<span class="tag tag-b">${esc(t)}</span>`).join('')}
      ${(p.tags_risk||[]).filter(Boolean).map(t=>`<span class="tag tag-r">${esc(t)}</span>`).join('')}
      ${(p.tags_neutral||[]).filter(Boolean).map(t=>`<span class="tag tag-n">${esc(t)}</span>`).join('')}
    </div>`;

  const metaChips = `
    <div class="meta-row">
      <span class="chip">$${p.price}</span>
      <span class="chip">Cap ${m.market_cap||'N/A'}</span>
      <span class="chip">Fwd P/E ${m.fwd_pe||'N/A'}×</span>
      <span class="chip">FCF ${m.fcf||'N/A'}</span>
      <span class="chip">Beta ${m.beta||'N/A'}</span>
      <span class="chip">Rev ${m.rev_growth||'N/A'} YoY</span>
      <span class="chip">GM ${m.gross_margin||'N/A'}</span>
      <span class="chip">52W Hi ${m.hi52_pct||'N/A'}</span>
    </div>`;

  return `
    <div class="card">
      <div class="accent" style="background:${acc}"></div>
      <div class="body">
        <div class="card-hdr">
          <div>
            <div class="pick-lbl">Pick ${p.rank} of 3 · ${convLabel(p.rank)}</div>
            <div class="ticker">${p.ticker}</div>
            <div class="coname">${esc(p.company)} · ${esc(p.sector)}</div>
          </div>
          <div class="conv-wrap"><div class="conv-num">${p.conviction}</div><div class="conv-lbl">conviction</div></div>
        </div>
        ${metaChips}
        ${chartBlock}
        ${levelBlock}
        ${signalBlock}
        ${barsBlock}
        ${intelBlock}
        ${tagsBlock}
        <div class="thesis">${esc(p.thesis||'')}</div>
      </div>
    </div>`;
}

// ── MARKET STRIP ─────────────────────────────────
function buildMkt(ctx){
  const items = [
    ['Market Bias',     ctx.bias],
    ['Sectors Leading', ctx.sectors_lead],
    ['Avoid',           ctx.sectors_avoid],
    ['FOMC Risk',       ctx.fomc_risk],
    ['Pipeline',        ctx.pipeline],
    ['Sources',         ctx.sources],
  ];
  return `<div class="s-title" style="margin-bottom:14px">Market Context</div>
    <div class="mkt-grid">${items.map(([k,v])=>`<div><div class="mkt-k">${k}</div><div class="mkt-v">${esc(v||'')}</div></div>`).join('')}</div>`;
}

// ── INTELLIGENCE VIEW ─────────────────────────────
function buildIntel(picks){
  return picks.map(p=>`
    <div class="card"><div class="body">
      <div class="i-div">${p.ticker} — ${esc(p.company)}</div>
      <div class="intel">${(p.intel||[]).map(c=>`<div class="intel-cell ic-${c.type}"><div class="ic-title">${esc(c.title)}</div><div class="ic-body">${esc(c.body)}</div></div>`).join('')}</div>
    </div></div>`).join('');
}

// ── CHART RENDERER ───────────────────────────────
function drawChart(canvasId, candles, pick, accentColor){
  const canvas = document.getElementById(canvasId);
  if(!canvas || !candles || !candles.length) return;

  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  const dpr  = window.devicePixelRatio || 1;
  const W    = canvas.parentElement.clientWidth || 700;
  const H    = parseInt(canvas.getAttribute('height')) || 280;
  canvas.width  = W*dpr; canvas.height = H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const P = {top:16,right:62,bottom:28,left:8};
  const cw=W-P.left-P.right, ch=H-P.top-P.bottom;

  let lo=Math.min(...candles.map(c=>c.l), pick.stop*0.997);
  let hi=Math.max(...candles.map(c=>c.h), pick.t2*1.003);
  const pad=(hi-lo)*0.07; lo-=pad; hi+=pad;
  const rng=hi-lo;
  const py = v => P.top+ch*(1-(v-lo)/rng);
  const n  = candles.length;
  const gap= cw/n;
  const cw2= Math.max(2,gap*.68);
  const cx = i => P.left+i*gap+gap/2;

  const gc = dark?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';
  const tc = dark?'rgba(255,255,255,.28)':'rgba(0,0,0,.28)';
  const pc = dark?'rgba(255,255,255,.13)':'rgba(0,0,0,.12)';
  const bC = dark?'#1fc87a':'#158a52';
  const rC = dark?'#f04f4f':'#c43535';

  ctx.clearRect(0,0,W,H);

  // grid lines
  for(let i=0;i<=4;i++){
    const y=P.top+ch*(i/4);
    ctx.strokeStyle=gc; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(P.left,y); ctx.lineTo(W-P.right,y); ctx.stroke();
  }

  // trade zones (shaded from last candle to right edge)
  const zx=cx(n-1)-cw2*.5, zw=W-P.right+12-zx;
  ctx.fillStyle=dark?'rgba(31,200,122,.09)':'rgba(21,138,82,.08)';
  ctx.fillRect(zx, py(pick.t2), zw, py(pick.entry)-py(pick.t2));
  ctx.fillStyle=dark?'rgba(240,79,79,.09)':'rgba(196,53,53,.08)';
  ctx.fillRect(zx, py(pick.entry), zw, py(pick.stop)-py(pick.entry));

  // candles
  for(let i=0;i<n;i++){
    const c=candles[i], x=cx(i), bull=c.c>=c.o, col=bull?bC:rC;
    const bT=py(Math.max(c.o,c.c)), bB=py(Math.min(c.o,c.c)), bH=Math.max(1,bB-bT);
    ctx.strokeStyle=col; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,py(c.h)); ctx.lineTo(x,py(c.l)); ctx.stroke();
    ctx.fillStyle=col; ctx.fillRect(x-cw2/2,bT,cw2,bH);
  }

  // current price dotted
  const last=candles[n-1].c;
  ctx.strokeStyle=pc; ctx.lineWidth=.8; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(P.left,py(last)); ctx.lineTo(W-P.right,py(last)); ctx.stroke();
  ctx.setLineDash([]);

  // level lines + pill labels
  function lvl(price, color, label, dashed){
    const y=py(price);
    ctx.strokeStyle=color; ctx.lineWidth=1;
    ctx.setLineDash(dashed?[4,3]:[]);
    ctx.beginPath(); ctx.moveTo(P.left,y); ctx.lineTo(W-P.right,y); ctx.stroke();
    ctx.setLineDash([]);
    const lx=W-P.right+2, lw=P.right-3, lh=15;
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.roundRect(lx,y-lh/2,lw,lh,3); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 8.5px -apple-system,Arial,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,lx+lw/2,y);
  }
  lvl(pick.t2,  '#1fc87a','T2',  true);
  lvl(pick.t1,  bC,       'T1',  true);
  lvl(pick.entry, accentColor, 'ENTRY', false);
  lvl(pick.stop,  rC,     'STOP', true);

  // date axis
  ctx.fillStyle=tc; ctx.font='9px -apple-system,Arial,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  for(let i=0;i<n;i+=8) ctx.fillText(candles[i].t.slice(5,10),cx(i),H-P.bottom+4);

  // ticker label
  ctx.fillStyle=tc; ctx.font='bold 11px -apple-system,Arial,sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(candles[0]?.tk || '', P.left+4, P.top+2);
}

// ── DRAW ALL VISIBLE CANVASES ─────────────────────
let DATA_CACHE = null;
function drawAll(){
  if(!DATA_CACHE) return;
  DATA_CACHE.picks.forEach((p,i)=>{
    const acc = ACCENTS[i];
    const lvls= {entry:p.price,stop:p.stop,t1:p.t1,t2:p.t2};
    ['all','setup'].forEach(mode=>{
      const id = `cv-${p.ticker}-${mode}`;
      const el = document.getElementById(id);
      if(el && el.parentElement && el.parentElement.clientWidth > 0){
        drawChart(id, p.candles, lvls, acc);
      }
    });
  });
}

// ── TABS ─────────────────────────────────────────
function sv(v,el){
  ['va','vs','vi'].forEach(id=>{ const e=document.getElementById(id); if(e) e.style.display='none'; });
  const show=document.getElementById('v'+v[0]);
  if(show) show.style.display='block';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(el) el.classList.add('on');
  setTimeout(drawAll,80);
}

// ── THEME ─────────────────────────────────────────
const SUN  = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
const MOON = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
function toggleTheme(){
  const html=document.documentElement;
  const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('ti').innerHTML=dark?SUN:MOON;
  document.getElementById('tl').textContent=dark?'Dark mode':'Light mode';
  localStorage.setItem('dt360-theme',dark?'light':'dark');
  setTimeout(drawAll,50);
}

// ── PERCENTAGE HELPER ─────────────────────────────
function pct(a, b, pos=false){
  const v=((a-b)/b*100);
  return (v>=0?'+':'')+v.toFixed(2)+'%';
}

// ── RENDER FROM DATA ──────────────────────────────
function render(data){
  DATA_CACHE = data;
  document.getElementById('hdr-date').textContent =
    (data.date||'') + ' · 4H · S&P 500 Top 50';

  const picks = data.picks || [];

  // All picks view
  document.getElementById('va').innerHTML = picks.map(p=>buildCard(p,'all')).join('');

  // Setup only view
  document.getElementById('vs').innerHTML = picks.map(p=>buildCard(p,'setup')).join('');

  // Intelligence view
  document.getElementById('vi').innerHTML = buildIntel(picks);

  // Market strip
  document.getElementById('mkt-strip').innerHTML = buildMkt(data.market_context||{});

  // Show app
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';

  // Draw charts after layout
  setTimeout(drawAll, 300);
}

// ── INIT ──────────────────────────────────────────
(function init(){
  // Theme persistence
  const saved=localStorage.getItem('dt360-theme');
  if(saved==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('ti').innerHTML=MOON;
    document.getElementById('tl').textContent='Light mode';
  }

  // Fetch data.json
  fetch('data.json?v=' + Date.now())
    .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(render)
    .catch(err=>{
      document.getElementById('loading').innerHTML =
        `<span>⚠</span>Could not load picks data.<br><small>${err}</small>`;
    });

  // Redraw on resize
  window.addEventListener('resize',()=>setTimeout(drawAll,100));
})();
</script>
