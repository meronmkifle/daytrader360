<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>@daytrader_360</title>
<style>
/* ══ TOKENS ═══════════════════════════════════════════ */
:root{
  --bg:#f0efe9;--surf:#fff;--surf2:#f5f4ee;--surf3:#eceae2;
  --brd:rgba(0,0,0,0.08);--brd2:rgba(0,0,0,0.15);
  --txt:#0f0f0e;--txt2:#4a4845;--txt3:#8f8c87;
  --bull:#158a52;--bear:#c43535;
  --bull-bg:rgba(21,138,82,.09);--bear-bg:rgba(196,53,53,.09);
  --bull-dk:#0a4f2e;--bear-dk:#6e1818;
  --info-bg:#e5edfb;--info-brd:#aec6f5;--info-txt:#163572;
  --warn-bg:#fdf1dc;--warn-brd:#f0c55c;--warn-txt:#6a3900;
  --strc-bg:#ebebfd;--strc-brd:#bbb8f8;--strc-txt:#312a92;
  --neu-bg:#f0efe9;--neu-brd:#d8d6ce;--neu-txt:#4a4845;
  --acc1:#2a7dd4;--acc2:#169b5e;--acc3:#a86512;
  --r:9px;--rl:13px;
  --sh:0 1px 2px rgba(0,0,0,.05),0 3px 10px rgba(0,0,0,.04);
  --sh2:0 2px 8px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.05);
}
[data-theme=dark]{
  --bg:#0c0c0b;--surf:#181816;--surf2:#1f1f1d;--surf3:#272724;
  --brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.13);
  --txt:#ece9e2;--txt2:#9c9994;--txt3:#5e5c57;
  --bull:#1fc87a;--bear:#f04f4f;
  --bull-bg:rgba(31,200,122,.11);--bear-bg:rgba(240,79,79,.11);
  --bull-dk:#6efbb6;--bear-dk:#fca5a5;
  --info-bg:#0d1d3a;--info-brd:#1b3868;--info-txt:#7ab4f8;
  --warn-bg:#261900;--warn-brd:#5a3c00;--warn-txt:#f5b84a;
  --strc-bg:#18133a;--strc-brd:#362c72;--strc-txt:#b4a8ff;
  --neu-bg:#1f1f1d;--neu-brd:#333330;--neu-txt:#9c9994;
  --sh:0 1px 2px rgba(0,0,0,.3),0 3px 10px rgba(0,0,0,.22);
  --sh2:0 2px 8px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
}

/* ══ RESET ════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--txt);line-height:1.5;min-height:100vh;
  -webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
.mono{font-family:'SF Mono','Fira Code','Fira Mono',monospace}

/* ══ PAGE ═════════════════════════════════════════════ */
.page{max-width:1160px;margin:0 auto;padding:0 22px 64px}

/* ══ TOPBAR ═══════════════════════════════════════════ */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:18px 0 16px;border-bottom:1px solid var(--brd);
  margin-bottom:0;gap:12px;flex-wrap:wrap}
.topbar-l{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-size:18px;font-weight:700;color:var(--txt)}
.logo em{font-style:normal;color:var(--acc1)}
.badge{font-family:'SF Mono','Fira Code',monospace;font-size:11px;
  color:var(--txt3);background:var(--surf2);border:1px solid var(--brd);
  padding:3px 9px;border-radius:5px;letter-spacing:.2px}
.topbar-r{display:flex;align-items:center;gap:8px}
.ibtn{display:flex;align-items:center;gap:6px;background:var(--surf);
  border:1px solid var(--brd2);border-radius:8px;padding:7px 15px;
  font-family:inherit;font-size:13px;font-weight:500;color:var(--txt2);
  cursor:pointer;transition:all .15s;white-space:nowrap}
.ibtn:hover{background:var(--surf2);color:var(--txt)}
.ibtn svg{width:14px;height:14px;flex-shrink:0}
.ibtn.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}

/* ══ NAV TABS ════════════════════════════════════════ */
.nav{display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:28px;overflow-x:auto}
.nav-tab{font-size:13px;font-weight:500;padding:14px 20px;color:var(--txt3);
  cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;
  transition:all .15s;margin-bottom:-1px}
.nav-tab:hover{color:var(--txt2)}
.nav-tab.on{color:var(--txt);border-bottom-color:var(--txt)}

/* ══ VIEWS ════════════════════════════════════════════ */
.view{display:none}.view.on{display:block}

/* ══ WEEK HEADER ══════════════════════════════════════ */
.week-hdr{display:flex;align-items:center;justify-content:space-between;
  margin:28px 0 14px;flex-wrap:wrap;gap:10px}
.week-title{font-size:16px;font-weight:700;color:var(--txt)}
.week-sub{font-size:12px;color:var(--txt3);margin-top:2px}
.week-pills{display:flex;gap:6px;flex-wrap:wrap}
.wpill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;
  border:1px solid var(--brd)}

/* ══ PICK CARD ════════════════════════════════════════ */
.pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:8px}
.pcard{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);
  overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:box-shadow .15s,transform .1s}
.pcard:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.pcard-accent{height:3px}
.pcard-body{padding:16px 18px}
.pcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.pcard-left{}
.pticker{font-size:22px;font-weight:700;color:var(--txt);letter-spacing:-.3px;line-height:1}
.pco{font-size:11px;color:var(--txt3);margin-top:3px}
.pcard-right{text-align:right}
.pconv{font-family:'SF Mono','Fira Code',monospace;font-size:24px;font-weight:600;color:var(--txt);line-height:1}
.pconv-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3)}
.pstatus-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.status-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.s-active  {background:var(--bull-bg);color:var(--bull-dk);border:1px solid rgba(21,138,82,.2)}
.s-hit_t1  {background:var(--bull-bg);color:var(--bull-dk);border:1px solid rgba(21,138,82,.3)}
.s-hit_t2  {background:rgba(21,138,82,.2);color:var(--bull-dk);border:1px solid rgba(21,138,82,.4)}
.s-stopped_out{background:var(--bear-bg);color:var(--bear-dk);border:1px solid rgba(196,53,53,.2)}
.s-closed  {background:var(--neu-bg);color:var(--neu-txt);border:1px solid var(--neu-brd)}
.pdate{font-size:10px;color:var(--txt3)}
.ptype-monday{color:var(--acc1)}
.ptype-wednesday{color:var(--acc3)}

/* Mini levels */
.mini-levels{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.ml{background:var(--surf2);border-radius:6px;padding:6px 8px;text-align:center;border:1px solid var(--brd)}
.ml-lbl{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:2px}
.ml-p{font-family:'SF Mono','Fira Code',monospace;font-size:12px;font-weight:600;color:var(--txt)}
.ml-pct{font-family:'SF Mono','Fira Code',monospace;font-size:9px;margin-top:1px}

/* Mini chart */
.mini-chart{height:80px;border-radius:6px;overflow:hidden;background:var(--surf2);margin-bottom:10px;border:1px solid var(--brd)}
canvas.mc{display:block;width:100%}

/* PnL bar */
.pnl-bar{display:flex;align-items:center;gap:8px;font-size:11px}
.pnl-val{font-family:'SF Mono','Fira Code',monospace;font-weight:700;font-size:13px}
.pnl-pos{color:var(--bull)}
.pnl-neg{color:var(--bear)}
.pnl-neu{color:var(--txt3)}
.current-p{font-size:10px;color:var(--txt3)}

/* Update badge */
.update-badge{display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;
  background:var(--warn-bg);color:var(--warn-txt);border:1px solid var(--warn-brd)}

/* ══ FILTER BAR ══════════════════════════════════════ */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-bar input{font-family:inherit;font-size:13px;padding:8px 12px;
  border-radius:8px;border:1px solid var(--brd2);background:var(--surf);
  color:var(--txt);outline:none;min-width:180px}
.filter-bar input:focus{border-color:var(--acc1)}
.filter-bar select{font-family:inherit;font-size:13px;padding:8px 12px;
  border-radius:8px;border:1px solid var(--brd2);background:var(--surf);
  color:var(--txt);outline:none;cursor:pointer}
.filter-bar select:focus{border-color:var(--acc1)}
.fcount{font-size:12px;color:var(--txt3);margin-left:4px}

/* ══ DETAIL PANEL (slide-in) ═════════════════════════ */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;
  opacity:0;pointer-events:none;transition:opacity .2s}
#overlay.open{opacity:1;pointer-events:all}
#detail{position:fixed;top:0;right:0;bottom:0;width:min(680px,100vw);
  background:var(--surf);box-shadow:-4px 0 32px rgba(0,0,0,.15);
  z-index:101;overflow-y:auto;transform:translateX(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1)}
#detail.open{transform:translateX(0)}
.detail-top{display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--brd);position:sticky;top:0;
  background:var(--surf);z-index:2}
.detail-close{background:none;border:none;font-size:22px;color:var(--txt3);
  cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1}
.detail-close:hover{background:var(--surf2);color:var(--txt)}
.detail-body{padding:20px 22px}

/* detail sections */
.d-section{margin-bottom:24px}
.d-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--txt3);margin-bottom:10px}
.levels-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.lv{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);
  padding:12px 14px;text-align:center}
.lv-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;
  color:var(--txt3);margin-bottom:5px}
.lv-p{font-family:'SF Mono','Fira Code',monospace;font-size:16px;font-weight:600;color:var(--txt)}
.lv-pct{font-family:'SF Mono','Fira Code',monospace;font-size:10px;margin-top:3px}
.chart-big{height:240px;border-radius:var(--r);overflow:hidden;
  background:var(--surf2);border:1px solid var(--brd);margin-bottom:16px}
canvas.bc{display:block;width:100%}
.sigs{display:flex;flex-wrap:wrap;gap:5px}
.sig{font-size:10px;font-weight:500;padding:3px 9px;border-radius:5px;
  background:var(--surf2);color:var(--txt2);border:1px solid var(--brd)}
.intel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ic{border-radius:var(--r);padding:12px 14px;border:1px solid}
.ic .ik{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.ic .iv{font-size:11px;line-height:1.65}
.ic-green{background:var(--bull-bg);border-color:rgba(21,138,82,.22);color:var(--bull-dk)}
.ic-blue {background:var(--info-bg);border-color:var(--info-brd);color:var(--info-txt)}
.ic-amber{background:var(--warn-bg);border-color:var(--warn-brd);color:var(--warn-txt)}
.ic-purple{background:var(--strc-bg);border-color:var(--strc-brd);color:var(--strc-txt)}
.thesis-box{font-size:12px;line-height:1.8;color:var(--txt2);
  background:var(--surf2);border-radius:var(--r);padding:14px 16px;
  border-left:3px solid var(--brd2)}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px}
.tag-b{background:var(--bull-bg);color:var(--bull-dk)}
.tag-r{background:var(--bear-bg);color:var(--bear-dk)}
.tag-n{background:var(--surf2);color:var(--txt2);border:1px solid var(--brd)}

/* Updates timeline */
.update-item{background:var(--surf2);border-radius:var(--r);padding:12px 14px;
  border:1px solid var(--brd);margin-bottom:8px}
.update-date{font-size:10px;font-weight:700;color:var(--acc3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.update-note{font-size:12px;color:var(--txt2);line-height:1.65;margin-bottom:6px}
.update-dev{font-size:11px;color:var(--txt3);font-style:italic}

/* ══ PERFORMANCE VIEW ════════════════════════════════ */
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);
  padding:16px 18px;box-shadow:var(--sh)}
.stat-k{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:6px}
.stat-v{font-family:'SF Mono','Fira Code',monospace;font-size:24px;font-weight:700;color:var(--txt);line-height:1}
.stat-sub{font-size:11px;color:var(--txt3);margin-top:4px}

/* Perf table */
.perf-table{width:100%;border-collapse:collapse;font-size:13px}
.perf-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:var(--txt3);padding:10px 12px;text-align:left;border-bottom:1px solid var(--brd);white-space:nowrap}
.perf-table td{padding:11px 12px;border-bottom:1px solid var(--brd);vertical-align:middle}
.perf-table tr:last-child td{border-bottom:none}
.perf-table tr:hover td{background:var(--surf2)}
.pt-ticker{font-weight:700;font-size:14px;color:var(--txt)}
.pt-co{font-size:11px;color:var(--txt3)}
.pt-mono{font-family:'SF Mono','Fira Code',monospace;font-size:12px}
.pt-pos{color:var(--bull)}
.pt-neg{color:var(--bear)}
.pt-neu{color:var(--txt3)}
.table-wrap{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);
  overflow:hidden;box-shadow:var(--sh);overflow-x:auto}

/* Mini sparkline in table */
canvas.spark{display:block}

/* ══ EMPTY STATE ═════════════════════════════════════ */
.empty{text-align:center;padding:48px 20px;color:var(--txt3);font-size:14px}
.empty span{display:block;font-size:28px;margin-bottom:8px}

/* ══ LOADING ══════════════════════════════════════════ */
#loading{text-align:center;padding:80px 20px;font-size:14px;color:var(--txt3)}
#loading span{display:block;font-size:28px;margin-bottom:10px;animation:spin 1.2s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ RESPONSIVE ══════════════════════════════════════ */
@media(max-width:700px){
  .page{padding:0 14px 44px}
  .pick-grid{grid-template-columns:1fr}
  .levels-grid{grid-template-columns:repeat(2,1fr)}
  .intel-grid{grid-template-columns:1fr}
  .perf-grid{grid-template-columns:repeat(2,1fr)}
  #detail{width:100vw}
  .nav-tab{padding:12px 14px;font-size:12px}
}
@media(max-width:440px){
  .levels-grid{grid-template-columns:repeat(2,1fr)}
  .perf-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page">

<div id="loading"><span>↻</span><br>Loading picks...</div>

<div id="app" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-l">
      <div class="logo"><em>@</em>daytrader_360</div>
      <div class="badge" id="hdr-badge">Loading...</div>
    </div>
    <div class="topbar-r">
      <button class="ibtn" onclick="toggleTheme()" id="tbtn">
        <svg id="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <span id="tl">Dark mode</span>
      </button>
    </div>
  </div>

  <!-- NAV TABS -->
  <div class="nav">
    <div class="nav-tab on" onclick="showView('weekly',this)">📅 This week</div>
    <div class="nav-tab" onclick="showView('all',this)">📋 All picks</div>
    <div class="nav-tab" onclick="showView('performance',this)">📊 Performance</div>
  </div>

  <!-- ══ VIEW: THIS WEEK ══ -->
  <div id="view-weekly" class="view on"></div>

  <!-- ══ VIEW: ALL PICKS ══ -->
  <div id="view-all" class="view">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search ticker or company..." oninput="filterAll()">
      <select id="filter-status" onchange="filterAll()">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="hit_t1">Hit T1</option>
        <option value="hit_t2">Hit T2</option>
        <option value="stopped_out">Stopped out</option>
        <option value="closed">Closed</option>
      </select>
      <select id="filter-type" onchange="filterAll()">
        <option value="">Monday + Wednesday</option>
        <option value="monday">Monday picks</option>
        <option value="wednesday">Wednesday refresh</option>
      </select>
      <select id="sort-by" onchange="filterAll()">
        <option value="date_desc">Newest first</option>
        <option value="date_asc">Oldest first</option>
        <option value="conviction">Conviction ↓</option>
        <option value="pnl">P&amp;L ↓</option>
        <option value="ticker">Ticker A–Z</option>
      </select>
      <span class="fcount" id="filter-count"></span>
    </div>
    <div id="all-picks-grid" class="pick-grid"></div>
  </div>

  <!-- ══ VIEW: PERFORMANCE ══ -->
  <div id="view-performance" class="view">
    <div class="perf-grid" id="perf-stats"></div>
    <div class="table-wrap">
      <table class="perf-table">
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Added</th>
            <th>Type</th>
            <th>Entry</th>
            <th>Exit</th>
            <th>P&L</th>
            <th>Status</th>
            <th>R:R</th>
            <th>Conviction</th>
          </tr>
        </thead>
        <tbody id="perf-tbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /app -->

<!-- DETAIL PANEL -->
<div id="overlay" onclick="closeDetail()"></div>
<div id="detail">
  <div class="detail-top">
    <div id="detail-title" style="font-size:18px;font-weight:700"></div>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

</div><!-- /page -->

<script>
// ══ GLOBALS ═══════════════════════════════════════════
const ACCENTS = ['#2a7dd4','#169b5e','#a86512'];
const PICK_ACCENTS = {monday:'#2a7dd4', wednesday:'#a86512'};
let ALL_PICKS = [];
let CURRENT_PICKS = [];

const SUN  = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
const MOON = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

// ══ THEME ═════════════════════════════════════════════
function toggleTheme(){
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('ti').innerHTML = dark ? SUN : MOON;
  document.getElementById('tl').textContent = dark ? 'Dark mode' : 'Light mode';
  localStorage.setItem('dt360-theme', dark ? 'light' : 'dark');
  setTimeout(() => redrawAllCharts(), 60);
}

// ══ VIEWS ═════════════════════════════════════════════

// ══ HELPERS ═══════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function pctStr(a, b){ const v=((a-b)/b*100); return (v>=0?'+':'')+v.toFixed(2)+'%' }
function pctVal(a, b){ return ((a-b)/b*100) }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) }
function weekLabel(w){ 
  const [y,wn] = w.split('-W');
  const d = new Date(y, 0, 1 + (parseInt(wn)-1)*7);
  return 'Week of ' + d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function statusLabel(s){
  return {active:'Active',hit_t1:'Hit T1 ✓',hit_t2:'Hit T2 ✓✓',stopped_out:'Stopped out',closed:'Closed'}[s] || s;
}

function currentPnl(pick){
  if (pick.status !== 'active') return pick.pnl_pct;
  const candles = pick.candles || [];
  if (!candles.length) return null;
  const now = candles[candles.length-1].c;
  return pctVal(now, pick.entry);
}

function currentPrice(pick){
  if (pick.exit_price) return pick.exit_price;
  const candles = pick.candles || [];
  return candles.length ? candles[candles.length-1].c : null;
}

// ══ MINI CHART ════════════════════════════════════════
function drawMiniChart(canvasId, pick) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const candles = pick.candles || [];
  if (!candles.length) return;

  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth || 300;
  const H = 80;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const P = {top:4,right:6,bottom:4,left:4};
  const cw = W-P.left-P.right, ch = H-P.top-P.bottom;
  const last20 = candles.slice(-20);
  let lo = Math.min(...last20.map(c=>c.l), pick.stop*0.998);
  let hi = Math.max(...last20.map(c=>c.h), pick.t1*1.002);
  const pad = (hi-lo)*0.06; lo-=pad; hi+=pad;
  const py = v => P.top+ch*(1-(v-lo)/(hi-lo));
  const n = last20.length;
  const gap = cw/n;
  const cw2 = Math.max(1.5, gap*0.6);
  const cx = i => P.left+i*gap+gap/2;

  ctx.clearRect(0,0,W,H);

  // entry line
  ctx.strokeStyle = PICK_ACCENTS[pick.type] || '#2a7dd4';
  ctx.lineWidth = 0.8; ctx.setLineDash([3,2]);
  const ey = py(pick.entry);
  ctx.beginPath(); ctx.moveTo(P.left,ey); ctx.lineTo(W-P.right,ey); ctx.stroke();
  ctx.setLineDash([]);

  // stop line
  ctx.strokeStyle = dark?'rgba(240,79,79,.5)':'rgba(196,53,53,.4)';
  ctx.lineWidth = 0.6; ctx.setLineDash([2,2]);
  ctx.beginPath(); ctx.moveTo(P.left,py(pick.stop)); ctx.lineTo(W-P.right,py(pick.stop)); ctx.stroke();
  ctx.setLineDash([]);

  const bC = dark?'#1fc87a':'#158a52';
  const rC = dark?'#f04f4f':'#c43535';

  for(let i=0;i<n;i++){
    const c=last20[i], x=cx(i), bull=c.c>=c.o, col=bull?bC:rC;
    const bT=py(Math.max(c.o,c.c)), bB=py(Math.min(c.o,c.c)), bH=Math.max(1,bB-bT);
    ctx.strokeStyle=col; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(x,py(c.h)); ctx.lineTo(x,py(c.l)); ctx.stroke();
    ctx.fillStyle=col; ctx.fillRect(x-cw2/2,bT,cw2,bH);
  }
}

// ══ BIG CHART ═════════════════════════════════════════
function drawBigChart(canvasId, pick) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const candles = pick.candles || [];
  if (!candles.length) return;

  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth || 600;
  const H = 240;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const P = {top:14,right:60,bottom:26,left:8};
  const cw=W-P.left-P.right, ch=H-P.top-P.bottom;

  let lo=Math.min(...candles.map(c=>c.l), pick.stop*0.997);
  let hi=Math.max(...candles.map(c=>c.h), pick.t2*1.003);
  const pad=(hi-lo)*0.07; lo-=pad; hi+=pad;
  const rng=hi-lo;
  const py=v=>P.top+ch*(1-(v-lo)/rng);
  const n=candles.length, gap=cw/n, cw2=Math.max(2,gap*.66);
  const cx=i=>P.left+i*gap+gap/2;

  const gc=dark?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';
  const tc=dark?'rgba(255,255,255,.28)':'rgba(0,0,0,.28)';
  const pc=dark?'rgba(255,255,255,.12)':'rgba(0,0,0,.12)';
  const bC=dark?'#1fc87a':'#158a52', rC=dark?'#f04f4f':'#c43535';

  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){const y=P.top+ch*(i/4);ctx.strokeStyle=gc;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(P.left,y);ctx.lineTo(W-P.right,y);ctx.stroke();}

  // zones
  const zx=cx(n-1)-cw2*.5, zw=W-P.right+10-zx;
  ctx.fillStyle=dark?'rgba(31,200,122,.08)':'rgba(21,138,82,.07)';
  ctx.fillRect(zx,py(pick.t2),zw,py(pick.entry)-py(pick.t2));
  ctx.fillStyle=dark?'rgba(240,79,79,.08)':'rgba(196,53,53,.07)';
  ctx.fillRect(zx,py(pick.entry),zw,py(pick.stop)-py(pick.entry));

  for(let i=0;i<n;i++){
    const c=candles[i],x=cx(i),bull=c.c>=c.o,col=bull?bC:rC;
    const bT=py(Math.max(c.o,c.c)),bB=py(Math.min(c.o,c.c)),bH=Math.max(1,bB-bT);
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,py(c.h));ctx.lineTo(x,py(c.l));ctx.stroke();
    ctx.fillStyle=col;ctx.fillRect(x-cw2/2,bT,cw2,bH);
  }

  const last=candles[n-1].c;
  ctx.strokeStyle=pc;ctx.lineWidth=.8;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(P.left,py(last));ctx.lineTo(W-P.right,py(last));ctx.stroke();
  ctx.setLineDash([]);

  const acc = PICK_ACCENTS[pick.type] || '#2a7dd4';
  function lvl(price,col,label,dashed){
    const y=py(price);
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash(dashed?[4,3]:[]);
    ctx.beginPath();ctx.moveTo(P.left,y);ctx.lineTo(W-P.right,y);ctx.stroke();ctx.setLineDash([]);
    const lx=W-P.right+2,lw=P.right-3,lh=15;
    ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(lx,y-lh/2,lw,lh,3);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 8px -apple-system,Arial,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,lx+lw/2,y);
  }
  lvl(pick.t2,'#1fc87a','T2',true);
  lvl(pick.t1,bC,'T1',true);
  lvl(pick.entry,acc,'ENTRY',false);
  lvl(pick.stop,rC,'STOP',true);

  ctx.fillStyle=tc;ctx.font='9px -apple-system,Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  for(let i=0;i<n;i+=8) ctx.fillText(candles[i].t.slice(5,10),cx(i),H-P.bottom+4);
  ctx.fillStyle=tc;ctx.font='bold 11px -apple-system,Arial,sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(pick.ticker+' · 4H',P.left+4,P.top+2);
}

// ══ SPARKLINE ═════════════════════════════════════════
function drawSpark(canvasId, pick) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const candles = (pick.candles||[]).slice(-15);
  if (!candles.length) return;
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  const dpr = window.devicePixelRatio||1;
  const W = 80, H = 30;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const closes=candles.map(c=>c.c);
  const lo=Math.min(...closes), hi=Math.max(...closes), rng=hi-lo||1;
  const py=v=>(H-4)*(1-(v-lo)/rng)+2;
  const n=closes.length, gap=W/n;
  const pnl = currentPnl(pick);
  const col = pnl===null?'#8f8c87':pnl>=0?'#158a52':'#c43535';
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.beginPath();
  closes.forEach((v,i)=>{ const x=i*gap+gap/2; i===0?ctx.moveTo(x,py(v)):ctx.lineTo(x,py(v)); });
  ctx.stroke();
}

// ══ RENDER WEEKLY VIEW ════════════════════════════════
function renderWeekly(picks) {
  // Group by week
  const weeks = {};
  picks.forEach(p => {
    if (!weeks[p.week_id]) weeks[p.week_id] = [];
    weeks[p.week_id].push(p);
  });

  const sorted = Object.entries(weeks).sort((a,b) => b[0].localeCompare(a[0]));
  let html = '';

  sorted.forEach(([wid, wPicks]) => {
    const active = wPicks.filter(p=>p.status==='active').length;
    const stopped = wPicks.filter(p=>p.status==='stopped_out').length;
    const won = wPicks.filter(p=>p.status==='hit_t1'||p.status==='hit_t2').length;
    const closed_pnls = wPicks.filter(p=>p.pnl_pct!==null).map(p=>p.pnl_pct);
    const avgPnl = closed_pnls.length ? closed_pnls.reduce((a,b)=>a+b,0)/closed_pnls.length : null;

    html += `
    <div class="week-hdr">
      <div>
        <div class="week-title">${weekLabel(wid)}</div>
        <div class="week-sub">${wPicks.length} picks · ${wPicks[0]?.week_id || ''}</div>
      </div>
      <div class="week-pills">
        ${active>0?`<span class="wpill" style="background:var(--bull-bg);color:var(--bull-dk);border-color:rgba(21,138,82,.2)">${active} active</span>`:''}
        ${won>0?`<span class="wpill" style="background:rgba(21,138,82,.15);color:var(--bull-dk);border-color:rgba(21,138,82,.3)">${won} won</span>`:''}
        ${stopped>0?`<span class="wpill" style="background:var(--bear-bg);color:var(--bear-dk);border-color:rgba(196,53,53,.2)">${stopped} stopped</span>`:''}
        ${avgPnl!==null?`<span class="wpill" style="background:var(--surf2);color:var(--txt2);border-color:var(--brd)">avg ${avgPnl>=0?'+':''}${avgPnl.toFixed(1)}%</span>`:''}
      </div>
    </div>
    <div class="pick-grid">${wPicks.map((p,i)=>buildPickCard(p,i)).join('')}</div>`;
  });

  document.getElementById('view-weekly').innerHTML = html;
  picks.forEach(p => setTimeout(() => drawMiniChart(`mc-${p.id}`, p), 60));
}

// ══ RENDER ALL PICKS (filtered) ════════════════════════
function filterAll() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  const st = document.getElementById('filter-status')?.value || '';
  const tp = document.getElementById('filter-type')?.value || '';
  const so = document.getElementById('sort-by')?.value || 'date_desc';

  let filtered = ALL_PICKS.filter(p => {
    const matchQ = !q || p.ticker.toLowerCase().includes(q) || p.company.toLowerCase().includes(q);
    const matchSt = !st || p.status === st;
    const matchTp = !tp || p.type === tp;
    return matchQ && matchSt && matchTp;
  });

  filtered.sort((a,b) => {
    if (so === 'date_desc') return b.date_added.localeCompare(a.date_added);
    if (so === 'date_asc')  return a.date_added.localeCompare(b.date_added);
    if (so === 'conviction') return b.conviction - a.conviction;
    if (so === 'pnl') {
      const pa = currentPnl(a) ?? -999, pb = currentPnl(b) ?? -999;
      return pb - pa;
    }
    if (so === 'ticker') return a.ticker.localeCompare(b.ticker);
    return 0;
  });

  document.getElementById('all-picks-grid').innerHTML = filtered.length
    ? filtered.map((p,i) => buildPickCard(p,i)).join('')
    : `<div class="empty" style="grid-column:1/-1"><span>🔍</span>No picks match your filters.</div>`;
  document.getElementById('filter-count').textContent = `${filtered.length} picks`;
  filtered.forEach(p => setTimeout(() => drawMiniChart(`mc-${p.id}`, p), 60));
}

// ══ RENDER PERFORMANCE VIEW ════════════════════════════
function renderPerf(picks) {
  const resolved = picks.filter(p => p.pnl_pct !== null);
  const wins = resolved.filter(p => p.pnl_pct > 0);
  const losses = resolved.filter(p => p.pnl_pct <= 0);
  const active = picks.filter(p => p.status === 'active');
  const allPnls = resolved.map(p => p.pnl_pct);
  const avgPnl = allPnls.length ? allPnls.reduce((a,b)=>a+b,0)/allPnls.length : 0;
  const winRate = resolved.length ? (wins.length/resolved.length*100) : 0;
  const bestTrade = allPnls.length ? Math.max(...allPnls) : 0;
  const worstTrade = allPnls.length ? Math.min(...allPnls) : 0;
  const totalPicks = picks.length;

  const statsHtml = [
    ['Total picks', totalPicks, `${active.length} active`],
    ['Win rate', winRate.toFixed(0)+'%', `${wins.length}W / ${losses.length}L`],
    ['Avg P&L', (avgPnl>=0?'+':'')+avgPnl.toFixed(2)+'%', 'closed trades'],
    ['Best trade', '+'+bestTrade.toFixed(2)+'%', picks.find(p=>p.pnl_pct===bestTrade)?.ticker||''],
    ['Worst trade', worstTrade.toFixed(2)+'%', picks.find(p=>p.pnl_pct===worstTrade)?.ticker||''],
    ['Active now', active.length, active.map(p=>p.ticker).join(', ')||'—'],
  ].map(([k,v,s]) => `
    <div class="stat-card">
      <div class="stat-k">${k}</div>
      <div class="stat-v" style="color:${k==='Best trade'?'var(--bull)':k==='Worst trade'?'var(--bear)':'var(--txt)'}">${v}</div>
      <div class="stat-sub">${s}</div>
    </div>`).join('');
  document.getElementById('perf-stats').innerHTML = statsHtml;

  const sortedForTable = [...picks].sort((a,b) => b.date_added.localeCompare(a.date_added));

  const tbodyHtml = sortedForTable.map(p => {
    const pnl = currentPnl(p);
    const pnlStr = pnl !== null
      ? `<span class="${pnl>=0?'pt-pos':'pt-neg'}">${pnl>=0?'+':''}${pnl.toFixed(2)}%</span>`
      : '<span class="pt-neu">Active</span>';
    const exitStr = p.exit_price ? `$${p.exit_price}` : `<span class="pt-neu">—</span>`;
    return `
    <tr onclick="openDetail('${p.id}')" style="cursor:pointer">
      <td><div class="pt-ticker">${esc(p.ticker)}</div><div class="pt-co">${esc(p.company)}</div></td>
      <td class="pt-mono pt-neu">${fmtDate(p.date_added)}</td>
      <td><span class="badge" style="font-size:10px">${p.type}</span></td>
      <td class="pt-mono">$${p.entry}</td>
      <td class="pt-mono">${exitStr}</td>
      <td class="pt-mono">${pnlStr}</td>
      <td><span class="status-pill s-${p.status}" style="font-size:9px">${statusLabel(p.status)}</span></td>
      <td class="pt-mono pt-neu">${p.rr}×</td>
      <td class="pt-mono">${p.conviction}</td>
    </tr>`;
  }).join('');
  document.getElementById('perf-tbody').innerHTML = tbodyHtml;
}

    <div class="d-section">
      <div class="d-title">4H Chart · Entry / Stop / Targets</div>
      <div class="chart-big"><canvas class="bc" id="bc-${p.id}"></canvas></div>
    </div>

    <!-- Levels -->
    <div class="d-section">
      <div class="d-title">Trade Levels</div>
      <div class="levels-grid">
        <div class="lv"><div class="lv-l">Entry</div><div class="lv-p">$${p.entry}</div><div class="lv-pct" style="color:var(--txt3)">market price</div></div>
        <div class="lv"><div class="lv-l">Stop Loss</div><div class="lv-p" style="color:var(--bear)">$${p.stop}</div><div class="lv-pct" style="color:var(--bear)">${pctStr(p.stop,p.entry)}</div></div>
        <div class="lv"><div class="lv-l">Target 1</div><div class="lv-p" style="color:var(--bull)">$${p.t1}</div><div class="lv-pct" style="color:var(--bull)">${pctStr(p.t1,p.entry)}</div></div>
        <div class="lv"><div class="lv-l">Target 2</div><div class="lv-p" style="color:var(--bull)">$${p.t2}</div><div class="lv-pct" style="color:var(--bull)">${pctStr(p.t2,p.entry)}</div></div>
      </div>
    </div>

    <!-- Signals -->
    <div class="d-section">
      <div class="d-title">Technical Signals · ATR $${p.atr} · R:R ${p.rr}×</div>
      <div class="sigs">${(p.signals||[]).map(s=>`<span class="sig">${esc(s)}</span>`).join('')}</div>
    </div>

    <!-- Fundamentals -->
    <div class="d-section">
      <div class="d-title">Fundamentals</div>
      <div class="sigs">${metaChipsHtml}</div>
    </div>

    <!-- Analyst -->
    ${analystHtml ? `<div class="d-section"><div class="d-title">Analyst Data</div>${analystHtml}</div>` : ''}

    <!-- Intelligence -->
    <div class="d-section">
      <div class="d-title">Intelligence Grid</div>
      <div class="intel-grid">${intelHtml}</div>
    </div>

    <!-- Tags + Thesis -->
    <div class="d-section">
      <div class="d-title">Tags</div>
      <div class="tags" style="margin-bottom:14px">${tagsHtml}</div>
      <div class="d-title">Thesis</div>
      <div class="thesis-box">${esc(p.thesis||'')}</div>
    </div>

    <!-- Wednesday updates -->
    <div class="d-section">
      <div class="d-title">Wednesday updates · ${(p.updates||[]).length} refresh${(p.updates||[]).length!==1?'es':''}</div>
      ${updatesHtml}
    </div>
  `;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('detail').classList.add('open');
  setTimeout(() => drawBigChart(`bc-${p.id}`, p), 100);
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });

// ══ REDRAW ALL VISIBLE CHARTS ═════════════════════════
function redrawAllCharts() {
  ALL_PICKS.forEach(p => {
    const mc = document.getElementById(`mc-${p.id}`);
    if (mc && mc.parentElement && mc.parentElement.clientWidth > 0) drawMiniChart(`mc-${p.id}`, p);
    const bc = document.getElementById(`bc-${p.id}`);
    if (bc && bc.parentElement && bc.parentElement.clientWidth > 0) drawBigChart(`bc-${p.id}`, p);
  });
}

// ══ MAIN RENDER ═══════════════════════════════════════
function render(picks) {
  ALL_PICKS = picks;

  // latest week for badge
  const latestDate = picks.reduce((a,b) => a > b.date_added ? a : b.date_added, '');
  document.getElementById('hdr-badge').textContent = latestDate
    ? fmtDate(latestDate) + ' · ' + picks.filter(p=>p.status==='active').length + ' active'
    : 'No picks yet';

  renderWeekly(picks);
  filterAll();
  renderPerf(picks);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ══ INIT ══════════════════════════════════════════════
(function init() {
  const saved = localStorage.getItem('dt360-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('ti').innerHTML = MOON;
    document.getElementById('tl').textContent = 'Light mode';
  }

  fetch('picks.json?v=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(render)
    .catch(err => {
      document.getElementById('loading').innerHTML =
        `<span>⚠</span><br>Could not load picks data.<br><small style="color:var(--txt3)">${err}</small>`;
    });

  window.addEventListener('resize', () => setTimeout(redrawAllCharts, 100));
})();
</script>
</body>
</html>
